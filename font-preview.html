function renderFonts(fonts, containerId, type) {
    var container = document.getElementById(containerId);
    var h = '';
    fonts.forEach(function(f) {
        h += '<div class="font-card" onclick="this.classList.toggle(\'selected\')">';
        h += '<div class="font-name">' + f.id + ' · ' + f.name + '<span class="font-tag">' + f.tag + '</span></div>';

        if (type === 'heading') {
            h += '<div class="font-sample-title" style="font-family:' + f.family + '">' + f.sample + '</div>';
            h += '<div class="font-sample-body" style="font-family:' + f.family + '">Financial Report · 2026.05</div>';
        } else if (type === 'body') {
            h += '<div class="font-sample-body" style="font-family:' + f.family + '">' + f.sample + '</div>';
        } else {
            h += '<div class="font-sample-num" style="font-family:' + f.family + '">' + f.sample + '</div>';
            h += '<div class="font-sample-body" style="font-family:' + f.family + '">毛利4,145.00  毛利率33.6%</div>';
        }

        h += '<div style="font-size:.65rem;color:#555;margin-top:4px">val: ' + (f.val || '(默认)') + '</div>';
        h += '</div>';
    });
    container.innerHTML = h;
}

renderFonts(headingFonts, 'headingFonts', 'heading');
