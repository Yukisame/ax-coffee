<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>岸香咖啡 · 报表查看</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Lexend:wght@400;500&family=Noto+Sans+SC:wght@400;700&family=Noto+Serif+SC:wght@400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0f1114;--card:#1a1d23;--card-h:#22262e;
--bd:#2a2e36;--bd-l:#333840;
--ac:#d4a853;--tx:#e8e4dc;--tx-m:#7a766e;--tx-s:#5a5850;
--gn:#4caf7d;--rd:#e05555;--og:#e8a035;
--fm:"DM Mono","Lexend",monospace;
--fd:"Playfair Display","Noto Serif SC",serif;
--fb:"Noto Serif SC",Georgia,serif;
--r:10px;--sp:12px;--sp-l:16px;
--sh:0 2px 8px rgba(0,0,0,0.3)
}
body{font-family:var(--fb);font-size:13px;background:var(--bg);color:var(--tx);min-height:100vh;-webkit-text-size-adjust:100%}
.container{max-width:750px;margin:0 auto;padding:var(--sp)}

/* 头部 */
.header{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--bd);margin-bottom:var(--sp)}
.header h1{font-family:var(--fd);font-size:1.1rem;color:var(--ac);font-weight:700}
.header .date{font-size:.72rem;color:var(--tx-m)}
.ro-badge{font-size:.62rem;padding:2px 8px;border-radius:4px;background:var(--card-h);color:var(--tx-m);border:1px solid var(--bd)}

/* 标签 */
.tabs{display:flex;gap:6px;margin-bottom:var(--sp-l)}
.tab{padding:8px 14px;font-size:.78rem;border-radius:var(--r);cursor:pointer;font-weight:600;border:1px solid var(--bd);background:var(--card-h);color:var(--tx-m);transition:all .2s}
.tab.active{background:var(--ac);color:#fff;border-color:var(--ac)}

/* 卡片 */
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:var(--sp)}
.card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:10px;text-align:center}
.card-l{font-size:.68rem;color:var(--tx-m);margin-bottom:4px}
.card-v{font-size:.9rem;font-weight:700}
.card-v.ac{color:var(--ac)}
.card-v.gn{color:var(--gn)}
.card-v.rd{color:var(--rd)}

/* 表格 */
.tw{overflow-x:auto;margin-bottom:var(--sp)}
.tw table{width:100%;border-collapse:collapse;font-size:.78rem}
.tw th{text-align:left;padding:6px 8px;background:var(--card-h);color:var(--tx-m);font-weight:600;border-bottom:1px solid var(--bd);font-size:.72rem;white-space:nowrap}
.tw td{padding:6px 8px;border-bottom:1px solid var(--bd-l);white-space:nowrap}
.tw .nr{text-align:right;font-family:var(--fm)}

/* 图表 */
.chart-col{display:flex;flex-direction:column;align-items:center;flex:1;min-width:0}
.chart-bar{width:100%;max-width:30px;border-radius:3px 3px 0 0;transition:height .3s ease}
.chart-lbl{font-size:.58rem;color:var(--tx-m);margin-top:4px;white-space:nowrap}
.chart-val{font-size:.55rem;color:var(--ac);margin-bottom:2px;font-family:var(--fm)}
.chart-row{display:flex;align-items:flex-end;height:100px;gap:2px;padding:0 4px;margin-bottom:6px}

/* 徽章 */
.badge{display:inline-block;font-size:.65rem;padding:2px 6px;border-radius:4px;background:var(--card-h);color:var(--tx-s);margin:2px}

/* 月份选择 */
.month-nav{display:flex;align-items:center;gap:12px;margin-bottom:var(--sp-l)}
.month-nav .btn{padding:4px 10px;font-size:.72rem;border-radius:6px;border:1px solid var(--bd);background:var(--card-h);color:var(--tx-m);cursor:pointer}
.month-nav .cur{font-size:.88rem;font-weight:700}

/* 报表页面 */
.report-page{display:none}
.report-page.active{display:block}

/* 加载 */
.loading{text-align:center;padding:40px;color:var(--tx-m)}
.loading .spinner{width:24px;height:24px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* 响应式 */
@media(max-width:600px){
.cards{grid-template-columns:repeat(2,1fr)}
.tw{font-size:.72rem}
.tw th,.tw td{padding:4px 6px}
.chart-row{height:80px}
}
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>岸香咖啡 · 报表</h1>
        <div style="display:flex;align-items:center;gap:8px">
            <span class="ro-badge">只读</span>
            <span class="date" id="headerDate"></span>
        </div>
    </div>

    <div class="tabs" id="tabs">
        <div class="tab active" onclick="showPage('dash')">总览</div>
        <div class="tab" onclick="showPage('daily')">日报</div>
        <div class="tab" onclick="showPage('purchase')">采购</div>
        <div class="tab" onclick="showPage('expense')">费用</div>
        <div class="tab" onclick="showPage('inv')">库存</div>
    </div>

    <div class="report-page active" id="pageDash"></div>
    <div class="report-page" id="pageDaily"></div>
    <div class="report-page" id="pagePurchase"></div>
    <div class="report-page" id="pageExpense"></div>
    <div class="report-page" id="pageInv"></div>
</div>

<script>
// ========================================
// 配置（填写主页面相同的 GitHub Token 和 Gist ID）
// ========================================
var CFG={
    gh_token:'ghp_你的Token',
    gh_gist_id:'你的GistID'
};

// ========================================
// 基础函数
// ========================================
function td(){var d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate()}
function curYM(){var d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1)}
function fmtC(n){return Number(n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',')}
function fmt(n){return Number(n||0).toFixed(2)}
function fmtP(n){return Number(n||0).toFixed(1)+'%'}
function lastYM(){var d=new Date();d.setMonth(d.getMonth()-1);return d.getFullYear()+'-'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1)}
function $id(id){return document.getElementById(id)}

var DB=null;
var INV={tea:{key:'teaItems',label:'茗茶'},cig:{key:'cigItems',label:'香烟'},alc:{key:'alcItems',label:'酒类'}};

function getMR(ym){return(DB.dailyReports||[]).filter(function(r){return r.date&&r.date.startsWith(ym)})}
function invCalc(item,type){
    var stock=0;
    if(type==='tea'){
        stock=parseFloat(item.opening)||0;
        (item.purchases||[]).forEach(function(p){stock+=parseFloat(p.qty)||0});
        (item.sales||[]).forEach(function(s){stock-=parseFloat(s.qty||s.totalQty||0)||0});
        stock=Math.round(stock*10)/10;
    }else{
        stock=parseInt(item.opening)||0;
        (item.purchases||[]).forEach(function(p){stock+=parseInt(p.qty)||0});
        (item.sales||[]).forEach(function(s){stock-=parseInt(s.qty||0)||0});
    }
    return{stock:stock}
}
function invCalcMon(item,type,ym){
    var actual=0,cost=0;
    (item.sales||[]).forEach(function(s){
        if(s.date&&s.date.startsWith(ym)){
            actual+=parseFloat(s.amount)||0;
        }
    });
    return{actual:actual,cost:cost}
}

// ========================================
// GitHub Gist 读取
// ========================================
function ghLoad(){
    return new Promise(function(resolve){
        if(!CFG.gh_token||!CFG.gh_gist_id){resolve({});return}
        var xhr=new XMLHttpRequest();
        xhr.open('GET','https://api.github.com/gists/'+CFG.gh_gist_id,true);
        xhr.setRequestHeader('Authorization','Bearer '+CFG.gh_token);
        xhr.onload=function(){
            try{
                var data=JSON.parse(xhr.responseText);
                var files=data.files||{};
                var f=files[Object.keys(files)[0]];
                if(f)resolve(JSON.parse(f.content));
                else resolve({});
            }catch(e){resolve({})}
        };
        xhr.onerror=function(){resolve({})};
        xhr.send();
    });
}

// ========================================
// 页面切换
// ========================================
var curTab='dash';
function showPage(tab){
    curTab=tab;
    document.querySelectorAll('.tab').forEach(function(t,i){
        var tabs=['dash','daily','purchase','expense','inv'];
        t.className='tab'+(tabs[i]===tab?' active':'');
    });
    document.querySelectorAll('.report-page').forEach(function(p){
        p.className='report-page'+(p.id==='page'+tab.charAt(0).toUpperCase()+tab.slice(1)?' active':'');
    });
    if(tab==='dash')renderDash();
    else if(tab==='daily')renderDaily();
    else if(tab==='purchase')renderPurchase();
    else if(tab==='expense')renderExpense();
    else if(tab==='inv')renderInv();
}

// ========================================
// 总览
// ========================================
var _dashYM=curYM();
function renderDash(){
    var el=$id('pageDash');
    var ym=_dashYM;
    var year=parseInt(ym.split('-')[0]),month=parseInt(ym.split('-')[1]);

    var mr=getMR(ym);
    var mNet=mr.reduce(function(s,r){return s+(r.revenue.netSales||0)},0);
    var mKit=mr.reduce(function(s,r){return s+(r.revenue.kitchenSales||0)},0);
    var mBar=mr.reduce(function(s,r){return s+(r.revenue.barSales||0)},0);
    var mDel=mr.reduce(function(s,r){return s+(r.delivery.total||0)},0);
    var mGuests=mr.reduce(function(s,r){return s+(r.guest.count||0)},0);
    var mPur=(DB.purchases||[]).filter(function(p){return p.date.startsWith(ym)}).reduce(function(s,p){return s+p.items.reduce(function(ss,i){return ss+i.total},0)},0);
    var mExp=(DB.expenses||[]).filter(function(e){return e.date.startsWith(ym)}).reduce(function(s,e){return s+e.amount},0);
    var mProfit=mNet-mPur-mExp;

    var h='';
    // 月份切换
    h+='<div class="month-nav">';
    h+='<div class="btn" onclick="_dashYM=prevYM(_dashYM);renderDash()">◀</div>';
    h+='<div class="cur">'+year+'年'+month+'月</div>';
    h+='<div class="btn" onclick="_dashYM=nextYM(_dashYM);renderDash()">▶</div></div>';

    // 核心指标
    h+='<div class="cards">';
    h+='<div class="card"><div class="card-l">实收</div><div class="card-v ac">'+fmtC(mNet)+'</div></div>';
    h+='<div class="card"><div class="card-l">成本</div><div class="card-v rd">'+fmtC(mPur)+'</div></div>';
    h+='<div class="card"><div class="card-l">净利润</div><div class="card-v'+(mProfit>=0?' gn':' rd')+'">'+fmtC(mProfit)+'</div></div>';
    h+='<div class="card"><div class="card-l">厨房</div><div class="card-v">'+fmtC(mKit)+'</div></div>';
    h+='<div class="card"><div class="card-l">吧台</div><div class="card-v">'+fmtC(mBar)+'</div></div>';
    h+='<div class="card"><div class="card-l">外卖</div><div class="card-v">'+fmtC(mDel)+'</div></div>';
    h+='<div class="card"><div class="card-l">客流</div><div class="card-v">'+mGuests+'人</div></div>';
    h+='<div class="card"><div class="card-l">人均</div><div class="card-v">'+(mGuests>0?fmtC(mNet/mGuests):'0')+'</div></div>';
    h+='<div class="card"><div class="card-l">费用</div><div class="card-v">'+fmtC(mExp)+'</div></div>';
    h+='</div>';

    // 日营收柱状图
    if(mr.length){
        var daysInMonth=new Date(year,month,0).getDate();
        var daySales=[];
        for(var d=1;d<=daysInMonth;d++){
            var ds=ym+'-'+(d<10?'0'+d:d);
            var found=mr.find(function(r){return r.date===ds});
            daySales.push(found?found.revenue.netSales||0:0);
        }
        var maxSale=Math.max.apply(null,daySales)||1;
        h+='<div style="background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:12px;margin-bottom:var(--sp)">';
        h+='<div style="font-size:.72rem;color:var(--ac);margin-bottom:8px">日营收</div>';
        h+='<div class="chart-row">';
        daySales.forEach(function(v,idx){
            var pct=v/maxSale*80;
            h+='<div class="chart-col"><div class="chart-val">'+(v>0?(v/1000).toFixed(1)+'k':'')+'</div><div class="chart-bar" style="height:'+Math.max(pct,2)+'%;background:'+(v>0?'var(--ac)':'var(--bd)')+'"></div><div class="chart-lbl">'+(idx+1)+'</div></div>';
        });
        h+='</div></div>';
    }

    el.innerHTML=h;
}
function prevYM(ym){var p=ym.split('-');var y=parseInt(p[0]),m=parseInt(p[1])-1;if(m<1){m=12;y--}return y+'-'+(m<10?'0'+m:m)}
function nextYM(ym){var p=ym.split('-');var y=parseInt(p[0]),m=parseInt(p[1])+1;if(m>12){m=1;y++}return y+'-'+(m<10?'0'+m:m)}

// ========================================
// 日报明细
// ========================================
var _dailyYM=curYM();
function renderDaily(){
    var el=$id('pageDaily');
    var ym=_dailyYM;
    var year=parseInt(ym.split('-')[0]),month=parseInt(ym.split('-')[1]);

    var mr=getMR(ym);
    var mNet=mr.reduce(function(s,r){return s+(r.revenue.netSales||0)},0);
    var mGuests=mr.reduce(function(s,r){return s+(r.guest.count||0)},0);

    var daysInMonth=new Date(year,month,0).getDate();
    var firstDay=new Date(year,month-1,1).getDay();
    firstDay=firstDay===0?6:firstDay-1;
    var todayStr=td();
    var todayDay=parseInt(todayStr.split('-')[2]);
    var isThisMonth=todayStr.startsWith(ym);

    var reportMap={};
    mr.forEach(function(r){reportMap[parseInt(r.date.substring(8,10))]=r});

    var h='';
    h+='<div class="month-nav">';
    h+='<div class="btn" onclick="_dailyYM=prevYM(_dailyYM);renderDaily()">◀</div>';
    h+='<div class="cur">'+year+'年'+month+'月 日报</div>';
    h+='<div class="btn" onclick="_dailyYM=nextYM(_dailyYM);renderDaily()">▶</div></div>';

    if(mr.length){
        h+='<div class="cards">';
        h+='<div class="card"><div class="card-l">本月实收</div><div class="card-v ac">'+fmtC(mNet)+'</div></div>';
        h+='<div class="card"><div class="card-l">已报天数</div><div class="card-v">'+mr.length+'</div></div>';
        h+='<div class="card"><div class="card-l">总客流</div><div class="card-v">'+mGuests+'</div></div>';
        h+='</div>';
    }

    // 日历
    h+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">';
    ['一','二','三','四','五','六','日'].forEach(function(w){
        h+='<div style="text-align:center;font-size:.7rem;color:var(--tx-m);padding:4px 0">'+w+'</div>';
    });
    for(var i=0;i<firstDay;i++)h+='<div></div>';
    for(var d=1;d<=daysInMonth;d++){
        var r=reportMap[d];
        var isToday=isThisMonth&&d===todayDay;
        var has=!!r;
        h+='<div style="background:'+(has?'var(--card)':'var(--card-h)')+';border:'+(isToday?'2px solid var(--ac)':'1px solid var(--bd))')+';border-radius:6px;padding:5px 4px;min-height:52px;cursor:'+(has?'pointer':'default')+'"';
        if(has)h+=' onclick="showDailyRO(\''+r.date+'\')"';
        h+='><div style="font-size:.7rem;font-weight:600;color:'+(isToday?'var(--ac)':'var(--tx)')+'">'+d+'</div>';
        if(has)h+='<div style="font-family:var(--fm);font-size:.65rem;color:var(--ac);margin-top:2px">'+fmtC(r.revenue.netSales)+'</div>';
        h+='</div>';
    }
    h+='</div>';

    if(!mr.length)h+='<div style="text-align:center;padding:20px;color:var(--tx-m)">本月暂无日报</div>';
    el.innerHTML=h;
}

function showDailyRO(date){
    var r=DB.dailyReports.find(function(d){return d.date===date});
    if(!r)return;
    var dateLabel=date.substring(5).replace('-','/');
    var h='<h3>'+dateLabel+' 日报</h3>';
    h+='<div class="cards">';
    h+='<div class="card"><div class="card-l">实收</div><div class="card-v ac">'+fmtC(r.revenue.netSales)+'</div></div>';
    h+='<div class="card"><div class="card-l">厨房</div><div class="card-v">'+fmtC(r.revenue.kitchenSales)+'</div></div>';
    h+='<div class="card"><div class="card-l">吧台</div><div class="card-v">'+fmtC(r.revenue.barSales)+'</div></div>';
    h+='<div class="card"><div class="card-l">外卖</div><div class="card-v">'+fmtC(r.delivery.total)+'</div></div>';
    h+='<div class="card"><div class="card-l">客流</div><div class="card-v">'+r.guest.count+'人</div></div>';
    h+='<div class="card"><div class="card-l">汇报人</div><div class="card-v">'+(r.reporter||'-')+'</div></div>';
    h+='</div>';
    h+='<div class="brow" style="margin-top:12px;text-align:right"><div class="btn" onclick="closeM()">关闭</div></div>';
    showM(h);
}

// ========================================
// 采购明细
// ========================================
var _purYM=curYM();
function renderPurchase(){
    var el=$id('pagePurchase');
    var ym=_purYM;
    var year=parseInt(ym.split('-')[0]),month=parseInt(ym.split('-')[1]);

    var pur=(DB.purchases||[]).filter(function(p){return p.date.startsWith(ym)});
    var grandTotal=pur.reduce(function(s,p){return s+p.items.reduce(function(ss,i){return ss+i.total},0)},0);
    var srcTotals={};
    pur.forEach(function(p){p.items.forEach(function(i){var src=i.source||p.source||'外购';if(!srcTotals[src])srcTotals[src]=0;srcTotals[src]+=i.total})});

    var dayTotals={};
    pur.forEach(function(p){
        var day=parseInt(p.date.substring(8,10));
        if(!dayTotals[day])dayTotals[day]=0;
        p.items.forEach(function(i){dayTotals[day]+=i.total});
    });

    var daysInMonth=new Date(year,month,0).getDate();
    var firstDay=new Date(year,month-1,1).getDay();
    firstDay=firstDay===0?6:firstDay-1;
    var todayStr=td();
    var todayDay=parseInt(todayStr.split('-')[2]);
    var isThisMonth=todayStr.startsWith(ym);

    var h='';
    h+='<div class="month-nav">';
    h+='<div class="btn" onclick="_purYM=prevYM(_purYM);renderPurchase()">◀</div>';
    h+='<div class="cur">'+year+'年'+month+'月 采购</div>';
    h+='<div class="btn" onclick="_purYM=nextYM(_purYM);renderPurchase()">▶</div></div>';

    if(grandTotal){
        h+='<div class="cards">';
        h+='<div class="card"><div class="card-l">本月采购</div><div class="card-v ac">'+fmtC(grandTotal)+'</div></div>';
        h+='<div class="card"><div class="card-l">天数</div><div class="card-v">'+Object.keys(dayTotals).length+'</div></div>';
        h+='<div class="card"><div class="card-l">日均</div><div class="card-v">'+fmtC(grandTotal/daysInMonth)+'</div></div>';
        h+='</div>';
        h+='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px">';
        Object.keys(srcTotals).forEach(function(src){h+='<span class="badge">'+src+' '+fmtC(srcTotals[src])+'</span>'});
        h+='</div>';
    }

    // 日历
    h+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">';
    ['一','二','三','四','五','六','日'].forEach(function(w){h+='<div style="text-align:center;font-size:.7rem;color:var(--tx-m);padding:4px 0">'+w+'</div>'});
    for(var i=0;i<firstDay;i++)h+='<div></div>';
    for(var d=1;d<=daysInMonth;d++){
        var has=!!dayTotals[d];
        var isToday=isThisMonth&&d===todayDay;
        var dateStr=ym+'-'+(d<10?'0'+d:d);
        h+='<div style="background:'+(has?'var(--card)':'var(--card-h)')+';border:'+(isToday?'2px solid var(--ac)':'1px solid var(--bd))')+';border-radius:6px;padding:5px 4px;min-height:52px;cursor:'+(has?'pointer':'default')+'"';
        if(has)h+=' onclick="showPurRO(\''+dateStr+'\')"';
        h+='><div style="font-size:.7rem;font-weight:600;color:'+(isToday?'var(--ac)':'var(--tx)')+'">'+d+'</div>';
        if(has){
            h+='<div style="font-family:var(--fm);font-size:.65rem;color:var(--ac);margin-top:2px">';
            if(dayTotals[d]>=10000)h+=(dayTotals[d]/10000).toFixed(1)+'万';
            else if(dayTotals[d]>=1000)h+=(dayTotals[d]/1000).toFixed(1)+'k';
            else h+='¥'+dayTotals[d].toFixed(0);
            h+='</div>';
        }
        h+='</div>';
    }
    h+='</div>';

    if(!grandTotal)h+='<div style="text-align:center;padding:20px;color:var(--tx-m)">本月暂无采购</div>';
    el.innerHTML=h;
}

function showPurRO(date){
    var dayPur=(DB.purchases||[]).filter(function(p){return p.date===date});
    var allItems=[];
    dayPur.forEach(function(p){p.items.forEach(function(i){allItems.push(i)})});
    var total=allItems.reduce(function(s,i){return s+i.total},0);
    var dateLabel=date.substring(5).replace('-','/');

    var h='<h3>'+dateLabel+' 采购明细</h3>';
    h+='<div style="text-align:right;font-size:.95rem;font-weight:700;color:var(--ac);margin-bottom:10px">¥'+fmtC(total)+'</div>';
    h+='<div class="tw"><table><tr><th>品名</th><th>数量</th><th>单价</th><th>总价</th></tr>';
    allItems.forEach(function(i){
        h+='<tr><td>'+i.name+'</td><td class="nr">'+i.qty+(i.unit||'')+'</td><td class="nr">'+fmt(i.unitPrice)+'</td><td class="nr">'+fmtC(i.total)+'</td></tr>';
    });
    h+='</table></div>';
    h+='<div class="brow" style="margin-top:12px;text-align:right"><div class="btn" onclick="closeM()">关闭</div></div>';
    showM(h);
}

// ========================================
// 费用明细
// ========================================
var _expYM=curYM();
function renderExpense(){
    var el=$id('pageExpense');
    var ym=_expYM;
    var year=parseInt(ym.split('-')[0]),month=parseInt(ym.split('-')[1]);

    var monthItems=(DB.expenses||[]).filter(function(e){return e.date.startsWith(ym)});
    var monthTotal=monthItems.reduce(function(s,e){return s+e.amount},0);
    var dayData={};
    monthItems.forEach(function(e){var day=parseInt(e.date.substring(8,10));if(!dayData[day])dayData[day]=0;dayData[day]+=e.amount});
    var catTotals={};
    monthItems.forEach(function(e){if(!catTotals[e.category])catTotals[e.category]=0;catTotals[e.category]+=e.amount});

    var daysInMonth=new Date(year,month,0).getDate();
    var firstDay=new Date(year,month-1,1).getDay();
    firstDay=firstDay===0?6:firstDay-1;
    var todayStr=td();
    var todayDay=parseInt(todayStr.split('-')[2]);
    var isThisMonth=todayStr.startsWith(ym);

    var h='';
    h+='<div class="month-nav">';
    h+='<div class="btn" onclick="_expYM=prevYM(_expYM);renderExpense()">◀</div>';
    h+='<div class="cur">'+year+'年'+month+'月 费用</div>';
    h+='<div class="btn" onclick="_expYM=nextYM(_expYM);renderExpense()">▶</div></div>';

    if(monthItems.length){
        h+='<div class="cards">';
        h+='<div class="card"><div class="card-l">本月费用</div><div class="card-v ac">'+fmtC(monthTotal)+'</div></div>';
        h+='<div class="card"><div class="card-l">笔数</div><div class="card-v">'+monthItems.length+'</div></div>';
        h+='<div class="card"><div class="card-l">日均</div><div class="card-v">'+fmtC(monthTotal/daysInMonth)+'</div></div>';
        h+='</div>';
        h+='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px">';
        Object.keys(catTotals).sort(function(a,b){return catTotals[b]-catTotals[a]}).forEach(function(cat){h+='<span class="badge">'+cat+' '+fmtC(catTotals[cat])+'</span>'});
        h+='</div>';
    }

    // 日历
    h+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">';
    ['一','二','三','四','五','六','日'].forEach(function(w){h+='<div style="text-align:center;font-size:.7rem;color:var(--tx-m);padding:4px 0">'+w+'</div>'});
    for(var i=0;i<firstDay;i++)h+='<div></div>';
    for(var d=1;d<=daysInMonth;d++){
        var has=!!dayData[d];
        var isToday=isThisMonth&&d===todayDay;
        var dateStr=ym+'-'+(d<10?'0'+d:d);
        h+='<div style="background:'+(has?'var(--card)':'var(--card-h)')+';border:'+(isToday?'2px solid var(--ac)':'1px solid var(--bd))')+';border-radius:6px;padding:5px 4px;min-height:52px;cursor:'+(has?'pointer':'default')+'"';
        if(has)h+=' onclick="showExpRO(\''+dateStr+'\')"';
        h+='><div style="font-size:.7rem;font-weight:600;color:'+(isToday?'var(--ac)':'var(--tx)')+'">'+d+'</div>';
        if(has)h+='<div style="font-family:var(--fm);font-size:.65rem;color:var(--ac);margin-top:2px">¥'+dayData[d].toFixed(0)+'</div>';
        h+='</div>';
    }
    h+='</div>';

    if(!monthItems.length)h+='<div style="text-align:center;padding:20px;color:var(--tx-m)">本月暂无费用</div>';
    el.innerHTML=h;
}

function showExpRO(date){
    var items=(DB.expenses||[]).filter(function(e){return e.date===date});
    var total=items.reduce(function(s,e){return s+e.amount},0);
    var dateLabel=date.substring(5).replace('-','/');
    var h='<h3>'+dateLabel+' 费用明细</h3>';
    h+='<div style="text-align:right;font-size:.95rem;font-weight:700;color:var(--ac);margin-bottom:10px">¥'+fmtC(total)+'</div>';
    h+='<div class="tw"><table><tr><th>分类</th><th>金额</th><th>备注</th></tr>';
    items.forEach(function(e){h+='<tr><td>'+e.category+'</td><td class="nr">'+fmtC(e.amount)+'</td><td>'+(e.note||'')+'</td></tr>'});
    h+='</table></div>';
    h+='<div class="brow" style="margin-top:12px;text-align:right"><div class="btn" onclick="closeM()">关闭</div></div>';
    showM(h);
}

// ========================================
// 库存概览
// ========================================
function renderInv(){
    var el=$id('pageInv');
    var ym=curYM();
    var h='';

    ['tea','cig','alc'].forEach(function(type){
        var items=DB[INV[type].key]||[];
        if(!items.length)return;
        var unit=type==='cig'?'包':type==='alc'?'瓶':'';

        h+='<div style="background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:12px;margin-bottom:12px">';
        h+='<div style="font-size:.84rem;font-weight:700;color:var(--ac);margin-bottom:8px">'+INV[type].label+'</div>';
        h+='<div class="tw"><table><tr><th>品名</th><th>库存</th><th>本月销售</th><th>本月实收</th></tr>';

        items.forEach(function(item){
            var c=invCalc(item,type);
            var mc=invCalcMon(item,type,ym);
            h+='<tr><td>'+item.name+'</td>';
            h+='<td class="nr">'+c.stock+(type==='tea'?'克':unit)+'</td>';
            var salesQty=0;
            (item.sales||[]).forEach(function(s){if(s.date&&s.date.startsWith(ym))salesQty+=(s.qty||s.cups||0)});
            h+='<td class="nr">'+salesQty+(type==='tea'?'杯':unit)+'</td>';
            h+='<td class="nr" style="color:var(--gn)">'+fmtC(mc.actual)+'</td></tr>';
        });

        h+='</table></div></div>';
    });

    // 仓库
    var whItems=DB.whItems||[];
    if(whItems.length){
        h+='<div style="background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:12px;margin-bottom:12px">';
        h+='<div style="font-size:.84rem;font-weight:700;color:var(--ac);margin-bottom:8px">仓库</div>';
        h+='<div class="tw"><table><tr><th>品名</th><th>库存</th><th>安全线</th><th>状态</th></tr>';
        whItems.forEach(function(item){
            var status=item.stock<=0?'🔴':item.stock<=item.safeStock?'🟡':'🟢';
            h+='<tr><td>'+item.name+'</td><td class="nr">'+item.stock+(item.unit||'')+'</td><td class="nr">'+(item.safeStock||0)+'</td><td>'+status+'</td></tr>';
        });
        h+='</table></div></div>';
    }

    if(!h)h='<div style="text-align:center;padding:30px;color:var(--tx-m)">暂无库存数据</div>';
    el.innerHTML=h;
}

// ========================================
// 弹窗（只读，没有保存按钮）
// ========================================
function showM(html){
    var el=document.getElementById('roModal');
    if(!el){
        el=document.createElement('div');
        el.id='roModal';
        el.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
        document.body.appendChild(el);
    }
    el.innerHTML='<div style="background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:18px;max-width:550px;width:92vw;max-height:80vh;overflow-y:auto;color:var(--tx)">'+html+'</div>';
    el.style.display='flex';
}
function closeM(){var el=document.getElementById('roModal');if(el)el.style.display='none'}

// ========================================
// 启动
// ========================================
document.getElementById('headerDate').textContent=td();
DB={dailyReports:[],purchases:[],expenses:[],teaItems:[],cigItems:[],alcItems:[],whItems:[],aiHistory:[],invoices:[],areaCats:{}};

// 加载本地缓存
try{var cached=localStorage.getItem('ax_ro_cache');if(cached)DB=JSON.parse(cached)}catch(e){}

// 显示缓存数据
renderDash();

// 从 Gist 加载最新数据
ghLoad().then(function(data){
    if(data&&data.dailyReports){
        DB=data;
        try{localStorage.setItem('ax_ro_cache',JSON.stringify(DB))}catch(e){}
        if(curTab==='dash')renderDash();
        else if(curTab==='daily')renderDaily();
        else if(curTab==='purchase')renderPurchase();
        else if(curTab==='expense')renderExpense();
        else if(curTab==='inv')renderInv();
    }
});
</script>
