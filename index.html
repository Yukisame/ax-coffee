            h += '<button class="btn s del-btn" style="font-size:.6rem;padding:1px 5px" onclick="event.stopPropagation();delPurCat(\'' + date + '\',\'' + sec.replace(/'/g, "\\'") + '\',\'' + cat.replace(/'/g, "\\'") + '\')">删除分类</button>';
            h += '</div></div>';

            h += '<div id="' + catId + '">';
            group.items.forEach(function(item) {
                h += '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 10px;margin-bottom:3px;background:var(--card-h);border:1px solid var(--bd-l);border-radius:6px">';
                h += '<div style="flex:1;min-width:0">';

                h += '</div></div>';
            });
            h += '</div></div>';
        });
        h += '</div></div>';
    });

    h += '</div>';
    h += '<div class="brow" style="margin-top:12px"><button class="btn" onclick="closeModal()">关闭</button></div>';

    if (sb) { sb.style.flex = '1'; sb.style.overflowY = 'auto'; sb.style.minHeight = '0'; }
}

function delPurSec(date, sec) {

    upd(function(db) {
        db.purchases.forEach(function(p) {
            if (p.date !== date) return;

// 删除某天某分类
function delPurCat(date, sec, cat) {
    if (!confirm('确认删除该分类「' + cat + '」的全部物品？')) return;
    upd(function(db) {
        db.purchases.forEach(function(p) {
            if (p.date !== date) return;
            p.items = p.items.filter(function(item) {
                return !((item.section || '未分区') === sec && (item.category || '未分类') === cat);

        });
        db.purchases = db.purchases.filter(function(p) { return p.items.length > 0; });
    });
    toast('已删除分类');
    renderPHist();
    var remain = DB.purchases.filter(function(p) { return p.date === date; });
    if (remain.length) showPurDayModal(date); else closeModal();
}

// 修改采购日期
function editPurDate(date) {
    var newDate = prompt('输入新日期（YYYY-MM-DD）', date);

// 处理费用凭证照片的输入事件，读取文件并存储Base64数据
var _expCalYM=curYM(); // 当前显示的年月
// 渲染费用日历视图
function renderExpCalendar(){
    var ym=_expCalYM;
    var year=parseInt(ym.split('-')[0]);
    var month=parseInt(ym.split('-')[1]);

    var monthItems=DB.expenses.filter(function(e){return e.date.startsWith(ym)});
    var monthTotal=monthItems.reduce(function(s,e){return s+e.amount},0);

    var dayData={};
    monthItems.forEach(function(e){
        var day=parseInt(e.date.substring(8,10));
        if(!dayData[day])dayData[day]=0;
        dayData[day]+=e.amount;
    });

    var catTotals={};
    monthItems.forEach(function(e){
        if(!catTotals[e.category])catTotals[e.category]=0;
        catTotals[e.category]+=e.amount;
    });

    var todayDay=parseInt(td().split('-')[2]);
    var isThisMonth=td().startsWith(ym);

    var h='';

    // 月份切换
    h+='<div class="hrow" style="margin-bottom:10px">';
    h+='<button class="btn s" onclick="expCalNav(-1)">◀ 上月</button>';
    h+='<span style="font-size:.88rem;font-weight:700;flex:1;text-align:center">'+year+'年'+month+'月</span>';
    h+='<button class="btn s" onclick="expCalNav(1)">下月 ▶</button></div>';

    // 日历网格（和日报一样的样式）
    var firstDay=new Date(year,month-1,1).getDay();
    firstDay=firstDay===0?6:firstDay-1;
    var daysInMonth=new Date(year,month,0).getDate();

    h+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:14px">';
    ['一','二','三','四','五','六','日'].forEach(function(w){
        h+='<div style="text-align:center;font-size:.7rem;color:var(--tx-m);padding:4px 0">'+w+'</div>';
    });

    for(var i=0;i<firstDay;i++)h+='<div></div>';

    for(var d=1;d<=daysInMonth;d++){
        var dateStr=ym+'-'+(d<10?'0'+d:d);
        var isToday=isThisMonth&&d===todayDay;
        var has=!!dayData[d];

        h+='<div style="background:'+(has?'var(--card)':'var(--card-h)')+';border:1px solid '+(isToday?'var(--ac)':'var(--bd)')+';border-radius:6px;padding:6px;cursor:'+(has?'pointer':'default')+';min-height:65px"';

        if(has)h+=' onclick="expDayClick(\''+dateStr+'\')"';

        h+='><div style="font-size:.72rem;font-weight:600;color:'+(isToday?'var(--ac)':'var(--tx)')+'">'+d+'</div>';

        if(has){
            h+='<div style="font-family:var(--fm);font-size:.7rem;color:var(--ac);margin-top:2px">¥'+fmtC(dayData[d])+'</div>';
        }else{
            h+='<div style="font-size:.6rem;color:var(--tx-m);margin-top:4px">-</div>';
        }
        h+='</div>';
    }
    h+='</div>';

    // 底部：本月汇总（和日报一样用cards）
    if(monthItems.length){
        h+='<div class="cards">';
        h+='<div class="card"><div class="card-l">本月费用</div><div class="card-v ac">'+fmtC(monthTotal)+'</div></div>';
        h+='<div class="card"><div class="card-l">笔数</div><div class="card-v">'+monthItems.length+'</div></div>';
        h+='<div class="card"><div class="card-l">日均</div><div class="card-v">'+fmtC(monthTotal/daysInMonth)+'</div></div>';
        h+='</div>';

        // 分类标签
        h+='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:10px">';
        Object.keys(catTotals).sort(function(a,b){return catTotals[b]-catTotals[a]}).forEach(function(cat){
            h+='<span class="badge">'+cat+' '+fmtC(catTotals[cat])+'</span>';
        });
        h+='</div>';
    }else{
        h+='<div style="text-align:center;padding:20px;color:var(--tx-m);font-size:.78rem">本月暂无费用记录</div>';
    }

    return h;
}

// 库存类型配置：茗茶、香烟、酒类
var INV = {
    tea: { label: '茗茶', key: 'teaItems' },
    cig: { label: '香烟', key: 'cigItems' },
    alc: { label: '酒类', key: 'alcItems' }
};

// ------ 库存主页 ------

// 库存主页：顶部统计卡片 + 标签栏（库存/明细）+ 库存表格
function rInv(type) {
    var items = DB[INV[type].key] || [];
    var ym = curYM();
    var unit = type === 'cig' ? '包' : type === 'alc' ? '瓶' : '';

    // 统计每个商品的本月数据
    var stats = [];
    items.forEach(function(item) {
        var sales = item.sales.filter(function(s) { return s.date.startsWith(ym); });
        var c = invCalc(item, type);
        var mc = invCalcMon(item, type, ym);
        var cups = 0, pots = 0, qty = 0, expected = 0;
        sales.forEach(function(s) {
            cups += (s.cups || 0); pots += (s.pots || 0); qty += (s.qty || 0);
            if (type === 'tea') expected += (s.cups || 0) * (item.pricePerCup || 0) + (s.pots || 0) * (item.pricePerPot || 0);
            else expected += (s.qty || 0) * (item.pricePerUnit || 0);
        });
        stats.push({ item: item, stock: c.stock, cups: cups, pots: pots, qty: qty, expected: expected, actual: mc.actual, cost: mc.cost, profit: mc.actual - mc.cost });
    });

    // 汇总
    var tE = stats.reduce(function(s, st) { return s + st.expected; }, 0);
    var tA = stats.reduce(function(s, st) { return s + st.actual; }, 0);
    var tC = stats.reduce(function(s, st) { return s + st.cost; }, 0);
    var tP = tA - tC;

    var h = '';

    // 顶部卡片
    h += '<div class="cards">';
    h += '<div class="card"><div class="card-l">品类</div><div class="card-v ac">' + items.length + '</div></div>';
    h += '<div class="card"><div class="card-l">应收</div><div class="card-v">' + fmtC(tE) + '</div></div>';
    h += '<div class="card"><div class="card-l">实收</div><div class="card-v gn">' + fmtC(tA) + '</div></div>';
    h += '<div class="card"><div class="card-l">成本</div><div class="card-v rd">' + fmtC(tC) + '</div></div>';
    h += '<div class="card"><div class="card-l">毛利</div><div class="card-v ac">' + fmtC(tP) + '</div></div>';
    h += '<div class="card"><div class="card-l">毛利率</div><div class="card-v">' + (tA > 0 ? fmtP(tP / tA * 100) : '0%') + '</div></div>';
    h += '</div>';

    // 标签栏
    h += '<div class="tab-bar" id="invT">';
    h += '<button class="tab-btn active" onclick="switchInvT(\'stock\',\'' + type + '\')">库存</button>';
    h += '<button class="tab-btn" onclick="switchInvT(\'hist\',\'' + type + '\')">明细</button>';
    h += '</div>';

    // 库存表格
    h += '<div id="invStock">';
    h += '<div class="brow" style="margin-bottom:14px">';
    h += '<button class="btn" onclick="showAddInv(\'' + type + '\')">+添加</button> ';
    h += '<button class="btn" onclick="invMoveAll(\'' + type + '\',1)">入库</button> ';
    h += '<button class="btn" onclick="invMoveAll(\'' + type + '\',-1)">销售</button>';
    h += '</div>';

    if (items.length) {
        h += '<div class="tw"><table>';

        if (type === 'tea') {
            h += '<tr><th>品名</th><th>期初</th><th>单价/杯</th><th>销售(杯)</th><th>销售(壶)</th><th>应收</th><th>实收</th><th>毛利</th><th>操作</th></tr>';
            stats.forEach(function(st) {
                h += '<tr data-inv="' + type + '_' + st.item.id + '">';
                h += '<td>' + st.item.name + '</td>';
                h += '<td class="nr">' + st.stock + '克</td>';
                h += '<td class="nr">' + fmt(st.item.pricePerCup || 0) + '</td>';

// 渲染库存销售明细日历
function renderInvHist(type) {
    var el = $id('invHist');
    if (!el) return;
    var ym = curYM();
    var items = DB[INV[type].key] || [];
    var unit = type === 'cig' ? '包' : type === 'alc' ? '瓶' : '';
    var mEl = $id('invHistM');
    if (mEl) ym = mEl.value || ym;

    var year = parseInt(ym.split('-')[0]);
    var month = parseInt(ym.split('-')[1]);
    var daysInMonth = new Date(year, month, 0).getDate();
    var firstDay = new Date(year, month - 1, 1).getDay();
    firstDay = firstDay === 0 ? 6 : firstDay - 1;
    var todayStr = td();
    var todayDay = parseInt(todayStr.split('-')[2]);
    var isThisMonth = todayStr.startsWith(ym);

    // 按日期汇总销售金额
    var dayTotals = {};
    items.forEach(function(item) {
        item.sales.forEach(function(s) {
            if (!s.date || !s.date.startsWith(ym)) return;
            var day = parseInt(s.date.substring(8, 10));
            if (!dayTotals[day]) dayTotals[day] = 0;
            dayTotals[day] += s.amount || 0;
        });
    });

    var monthTotal = Object.values(dayTotals).reduce(function(s, v) { return s + v; }, 0);

    var h = '';
    h += '<div class="hrow"><label>月份</label><input class="inp" id="invHistM" type="month" value="' + ym + '" style="max-width:180px" onchange="renderInvHist(\'' + type + '\')"></div>';

    // 日历网格
    h += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:14px">';
    ['一', '二', '三', '四', '五', '六', '日'].forEach(function(w) {
        h += '<div style="text-align:center;font-size:.7rem;color:var(--tx-m);padding:4px 0">' + w + '</div>';
    });

    for (var i = 0; i < firstDay; i++) h += '<div></div>';

    for (var d = 1; d <= daysInMonth; d++) {
        var dateStr = ym + '-' + (d < 10 ? '0' + d : d);
        var has = !!dayTotals[d];
        var isToday = isThisMonth && d === todayDay;
        var bg = has ? 'var(--card)' : 'var(--card-h)';
        var border = isToday ? '2px solid var(--ac)' : '1px solid var(--bd)';

        h += '<div style="background:' + bg + ';border:' + border + ';border-radius:6px;padding:5px 4px;min-height:52px;cursor:' + (has ? 'pointer' : 'default') + '"';
        if (has) h += ' onclick="showInvDayModal(\'' + type + '\',\'' + dateStr + '\')"';
        h += '><div style="font-size:.7rem;font-weight:600;color:' + (isToday ? 'var(--ac)' : 'var(--tx)') + '">' + d + '</div>';
        if (has) {
            h += '<div style="font-family:var(--fm);font-size:.65rem;color:var(--ac);margin-top:2px">';
            if (dayTotals[d] >= 10000) h += (dayTotals[d] / 10000).toFixed(1) + '万';
            else if (dayTotals[d] >= 1000) h += (dayTotals[d] / 1000).toFixed(1) + 'k';
            else h += '¥' + dayTotals[d].toFixed(0);
            h += '</div>';
        }
        h += '</div>';
    }
    h += '</div>';

    if (!monthTotal) h += '<div style="text-align:center;padding:20px;color:var(--tx-m);font-size:.78rem">本月暂无销售记录</div>';
    el.innerHTML = h;
}

// 日销售详情弹窗
function showInvDayModal(type, date) {
    var items = DB[INV[type].key] || [];
    var unit = type === 'cig' ? '包' : type === 'alc' ? '瓶' : '';
    var records = [];
    items.forEach(function(item) {
        item.sales.forEach(function(s) {
            if (s.date === date) records.push({ item: item, sale: s });
        });
    });
    if (!records.length) { toast('这天没有销售记录'); return; }

    var total = records.reduce(function(s, r) { return s + (r.sale.amount || 0); }, 0);
    var dateLabel = date.substring(5).replace('-', '/');

    var h = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
    h += '<h3 style="margin:0">' + dateLabel + ' ' + INV[type].label + '销售</h3>';
    h += '<span style="font-size:.95rem;font-weight:700;color:var(--ac)">¥' + fmtC(total) + '</span></div>';

    h += '<div style="max-height:50vh;overflow-y:auto;padding-right:4px">';
    records.forEach(function(r) {
        h += '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;margin-bottom:6px;background:var(--card-h);border:1px solid var(--bd);border-radius:8px">';
        h += '<div style="flex:1;min-width:0">';
        h += '<div style="font-size:.84rem;font-weight:600">' + r.item.name + '</div>';
        if (type === 'tea') {
            h += '<div style="font-size:.72rem;color:var(--tx-m);margin-top:2px">' + (r.sale.cups || 0) + '杯 · ' + (r.sale.pots || 0) + '壶</div>';
        } else {
            h += '<div style="font-size:.72rem;color:var(--tx-m);margin-top:2px">' + (r.sale.qty || 0) + unit + '</div>';
        }
        h += '</div>';
        h += '<span style="font-size:.88rem;font-weight:700;color:var(--ac)">¥' + fmtC(r.sale.amount || 0) + '</span>';
        h += '</div>';
    });
    h += '</div>';

    h += '<div class="brow" style="margin-top:12px"><button class="btn" onclick="closeModal()">关闭</button></div>';
    showModal(h, 550);
}

// 单个商品的进销存详情弹窗（按日期展示销售+出入库记录）
function invDetail(type, itemId) {
    var item = DB[INV[type].key].find(function(i) { return i.id === itemId; });

    h += '<div style="max-height:55vh;overflow-y:auto;padding-right:4px">';

        allRecords.forEach(function(r) {

            if (r.kind === 'sale') {

            h += '<div style="display:flex;align-items:center;gap:6px;flex-shrink:0">';

    h += '</div>';
    h += '<div class="brow" style="margin-top:12px"><button class="btn" onclick="closeModal()">关闭</button></div>';
    showModal(h, 550);
}

// 构建进销存记录列表（销售+出入库按日期排序）
function buildRecords(item, type, ym) {
    var allRecords = [];

    // 销售记录
    item.sales.forEach(function(s, idx) {
        if (!s.date.startsWith(ym)) return;
        var expected = 0;
        if (type === 'tea') {
            expected = (s.cups || 0) * (item.pricePerCup || 0) + (s.pots || 0) * (item.pricePerPot || 0);
        } else {
            expected = (s.qty || 0) * (item.pricePerUnit || 0);
        }
        allRecords.push({ date: s.date, kind: 'sale', idx: idx, data: s, expected: expected, actual: s.amount || 0 });
    });

    // 出入库记录
    (item.purchases || []).forEach(function(m, idx) {
        if (!m.date.startsWith(ym)) return;
        allRecords.push({ date: m.date, kind: 'move', idx: idx, data: m, expected: 0, actual: m.qty >= 0 ? (m.cost || 0) : -(m.cost || 0) });
    });

    // 按日期排序
    allRecords.sort(function(a, b) { return a.date.localeCompare(b.date); });
    return allRecords;
}

// 渲染销售明细表格（用于详情弹窗中的销售标签）

            var amt = s.amount || 0;
            h += '<td class="nr">' + cups + '</td><td class="nr">' + pots + '</td>';
            h += '<td class="nr">' + fmtC(exp) + '</td><td class="nr" style="color:var(--gn)">' + fmtC(amt) + '</td>';

// 渲染出入库明细表格（入库/出库/销售混合）
function renderBuyDetail(item, type, ym, unit) {
    var h = '<div class="hrow"><label>月份</label><input class="inp" id="detBuyM" type="month" value="' + ym + '" style="max-width:180px" onchange="detBuyRefresh(\'' + type + '\',\'' + item.id + '\')"></div>';

    var moves = [];
    try { moves = (item.purchases || []).filter(function(p) { return p.date && p.date.startsWith(ym); }); } catch (e) {}
    var sales = [];
    try { sales = (item.sales || []).filter(function(s) { return s.date && s.date.startsWith(ym); }); } catch (e) {}

    // 统一单位
    var u = unit;
    if (type === 'tea' && item.calcMode === 'pack') u = '包';
    else if (type === 'tea') u = '克';

    // 合并出入库+销售记录
    var allRows = [];
    moves.forEach(function(m) {
        allRows.push({ date: m.date, type: m.qty >= 0 ? '入库' : '出库', qty: Math.abs(m.qty), reason: m.source || '-', cost: m.cost || 0, amount: 0, rowType: 'move', ref: item.purchases.indexOf(m) });
    });
    sales.forEach(function(s) {
        var qty = 0, exp = 0;
        if (type === 'tea') {
            var cups = s.cups || 0, pots = s.pots || 0;
            var mode = item.calcMode || 'gram';
            if (mode === 'pack') qty = Math.round((cups * (item.packsPerCup || 1) + pots * (item.packsPerPot || 2)) * 100) / 100;
            else qty = Math.round((cups * (item.gramsPerCup || 5) + pots * (item.gramsPerPot || 15)) * 100) / 100;
            exp = s.expectedAmount || (cups * (item.pricePerCup || 0) + pots * (item.pricePerPot || 0));
        } else {
            qty = s.qty || 0;
            exp = qty * (item.pricePerUnit || 0);
        }
        allRows.push({ date: s.date, type: '销售', qty: qty, reason: '销售', cost: 0, expected: exp, amount: s.amount || 0, rowType: 'sale', ref: item.sales.indexOf(s) });
    });

    allRows.sort(function(a, b) { return a.date.localeCompare(b.date); });

    if (!allRows.length) {
        h += '<div style="text-align:center;padding:20px;color:var(--tx-m)">本月暂无出入库</div>';
        return h;
    }

    var totalIn = 0, totalOut = 0, totalSale = 0, totalExp = 0, totalAmt = 0;
    h += '<div class="tw"><table><tr><th>日期</th><th>类型</th><th>数量</th><th>来源</th><th>应收</th><th>实收</th><th>操作</th></tr>';

    allRows.forEach(function(r) {
        var color = r.type === '入库' ? 'gn' : r.type === '销售' ? 'og' : 'rd';
        h += '<tr><td>' + r.date + '</td>';
        h += '<td><span class="badge ' + color + '">' + r.type + '</span></td>';
        h += '<td class="nr">' + r.qty + u + '</td>';
        h += '<td style="font-size:.72rem">' + r.reason + '</td>';
        if (r.type === '销售') {
            h += '<td class="nr">' + fmtC(r.expected || 0) + '</td>';
            h += '<td class="nr" style="color:var(--gn)">' + fmtC(r.amount || 0) + '</td>';
        } else {
            h += '<td class="nr">' + (r.cost ? fmtC(r.cost) : '-') + '</td>';
            h += '<td class="nr">-</td>';
        }
        h += '<td><button class="btn s" onclick="editInvRow(\'' + type + '\',\'' + item.id + '\',\'' + r.rowType + '\',' + r.ref + ',\'' + u + '\')">编</button> ';
        h += '<button class="btn s d" onclick="delInvRow(\'' + type + '\',\'' + item.id + '\',\'' + r.rowType + '\',' + r.ref + ')">×</button></td></tr>';

        if (r.type === '入库') totalIn += r.qty;
        else if (r.type === '出库') totalOut += r.qty;
        else if (r.type === '销售') { totalSale += r.qty; totalExp += (r.expected || 0); totalAmt += (r.amount || 0); }
    });

    h += '<tr style="background:var(--card-h)"><td style="font-weight:600">合计</td><td></td>';
    h += '<td class="nr" style="font-weight:600">入:' + Math.round(totalIn * 100) / 100 + ' 出:' + Math.round(totalOut * 100) / 100 + ' 销:' + Math.round(totalSale * 100) / 100 + u + '</td>';
    h += '<td></td><td class="nr" style="font-weight:600">' + fmtC(totalExp) + '</td>';
    h += '<td class="nr" style="font-weight:600;color:var(--gn)">' + fmtC(totalAmt) + '</td><td></td></tr>';
    h += '</table></div>';
    return h;
}

// 弹窗编辑出入库或销售记录
function editInvRow(type, itemId, rowType, idx, unit) {
    var item = DB[INV[type].key].find(function(i) { return i.id === itemId; });
    if (!item) return;

    if (rowType === 'move') {
        // 编辑出入库
        var m = item.purchases[idx];
        if (!m) return;
        var h = '<h3>编辑出入库</h3>';

// 编辑销售时自动计算应收金额（茗茶）
function calcEditTeaExp(itemId) {
    var item = DB.teaItems.find(function(i) { return i.id === itemId; });
    if (!item) return;
    var cups = parseInt($id('eir_cups').value) || 0;
    var pots = parseInt($id('eir_pots').value) || 0;
    $id('eir_exp').value = (cups * (item.pricePerCup || 0) + pots * (item.pricePerPot || 0)).toFixed(2);
}

// 保存编辑的出入库记录
function doEditInvMove(type, itemId, idx) {
    var item = DB[INV[type].key].find(function(i) { return i.id === itemId; });
    if (!item || !item.purchases[idx]) return;
    var qty = parseFloat($id('eir_qty').value) || 0;
    var dir = $id('eir_dir').value === '入库' ? 1 : -1;
    upd(function(db) {
        var it = db[INV[type].key].find(function(i) { return i.id === itemId; });
        if (it && it.purchases[idx]) {
            it.purchases[idx].qty = qty * dir;
            it.purchases[idx].date = $id('eir_date').value || td();
            it.purchases[idx].source = $id('eir_src').value.trim();
            var cost = parseFloat($id('eir_cost').value);
            if (cost > 0) it.purchases[idx].cost = cost;
        }
    });
    closeModal();
    toast('已更新');
    refreshDetBuy(type, itemId);
}

// 保存编辑的销售记录（同步更新日报）
function doEditInvSale(type, itemId, idx) {
    var item = DB[INV[type].key].find(function(i) { return i.id === itemId; });
    if (!item || !item.sales[idx]) return;
    var date = $id('eir_sdate').value || td();
    var expected = parseFloat($id('eir_exp').value) || 0;
    var amount = parseFloat($id('eir_samt').value) || expected;

    if (type === 'tea') {
        var cups = parseInt($id('eir_cups').value) || 0;
        var pots = parseInt($id('eir_pots').value) || 0;
        upd(function(db) {
            var it = db[INV[type].key].find(function(i) { return i.id === itemId; });
            if (!it) return;
            it.sales[idx] = { date: date, cups: cups, pots: pots, expectedAmount: expected, amount: amount };
            syncDailyTeaSales(db, date, itemId, cups, pots, amount);
        });
    } else {
        var qty = parseInt($id('eir_sqty').value) || 0;
        upd(function(db) {
            var it = db[INV[type].key].find(function(i) { return i.id === itemId; });
            if (!it) return;
            it.sales[idx] = { date: date, qty: qty, amount: amount };
            syncDailyCigSales(db, date, itemId, qty, amount);
        });
    }
    closeModal();
    toast('已更新');
    refreshDetBuy(type, itemId);
}

// 删除出入库或销售记录
function delInvRow(type, itemId, rowType, idx) {
    var item = DB[INV[type].key].find(function(i) { return i.id === itemId; });
    if (!item) return;
    if (!confirm('删除此条记录？')) return;

    if (rowType === 'move') {
        upd(function(db) {
            var it = db[INV[type].key].find(function(i) { return i.id === itemId; });
            if (it) it.purchases.splice(idx, 1);
        });
        toast('已删除');
    } else {
        var sale = item.sales[idx];
        upd(function(db) {
            var it = db[INV[type].key].find(function(i) { return i.id === itemId; });
            if (!it) return;
            it.sales.splice(idx, 1);
            if (sale) {
                var date = sale.date;
                db.dailyReports.forEach(function(dr) {
                    if (dr.date !== date) return;
                    if (type === 'tea' && dr.teaSales && dr.teaSales[itemId]) delete dr.teaSales[itemId];
                    if (type === 'cig' && dr.cigSales && dr.cigSales[itemId]) delete dr.cigSales[itemId];
                });
            }
        });
        toast('已删除');
    }
    refreshDetBuy(type, itemId);
}

// 同步香烟销售数据到日报
function syncDailyCigSales(db, date, itemId, qty, amt) {
    db.dailyReports.forEach(function(dr) {
        if (dr.date !== date) return;
        if (dr.cigSales && dr.cigSales[itemId]) {
            dr.cigSales[itemId] = { qty: qty, amount: amt };
            var total = 0;
            Object.keys(dr.cigSales).forEach(function(k) { total += dr.cigSales[k].amount || 0; });
            dr.revenue.cigarette.total = total;
        }
    });
}

// 同步茗茶销售数据到日报
function syncDailyTeaSales(db, date, itemId, cups, pots, amt) {
    db.dailyReports.forEach(function(dr) {
        if (dr.date !== date) return;
        if (dr.teaSales && dr.teaSales[itemId]) {
            dr.teaSales[itemId] = { cups: cups, pots: pots, amount: amt };
        }
    });
}

// 执行单个物品的入库或销售操作
function doInvMove(type, id, dir) {
    var date = $id('mvDate').value || td();
    var cfg = INV[type];

    if (dir > 0) {
        // 入库
        var qty = parseFloat($id('mvQty').value);
        var unit = $id('mvUnit').value;
        if (isNaN(qty) || qty <= 0) { toast('填数量'); return; }

        var stockQty = qty;
        if (type === 'tea') {
            var it = DB[cfg.key].find(function(i) { return i.id === id; });
            if (it && it.calcMode === 'pack') { stockQty = qty; }
            else { if (unit === '斤') stockQty = qty * 500; }
        } else if (type === 'cig') {
            var it = DB[cfg.key].find(function(i) { return i.id === id; });
            if (unit === '条') stockQty = qty * (it ? it.purchaseConvRatio || 10 : 10);
        } else {
            var it = DB[cfg.key].find(function(i) { return i.id === id; });
            if (unit === '箱') stockQty = qty * (it ? it.purchaseConvRatio || 12 : 12);
        }
        stockQty = Math.round(stockQty * 100) / 100;

        var entry = { date: date, qty: stockQty, source: $id('mvReason').value || '' };
        var cost = parseFloat($id('mvCost').value);
        if (cost > 0) entry.cost = cost;

        upd(function(db) {
            var it = db[cfg.key].find(function(i) { return i.id === id; });
            if (!it) return;
            it.purchases.push(entry);
        });
        closeModal();
        toast('入库 ' + qty + unit);
    } else {
        // 销售
        var reason = $id('mvReason').value || '';

        if (type === 'tea') {
            var it = DB[cfg.key].find(function(i) { return i.id === id; });
            if (!it) return;
            var cups = parseInt($id('mvCups').value) || 0;
            var pots = parseInt($id('mvPots').value) || 0;
            var expected = parseFloat($id('mvExpected').value) || 0;
            var amount = parseFloat($id('mvAmount').value) || expected;
            var mode = it.calcMode || 'gram';
            var stockUsed = 0;
            if (mode === 'pack') stockUsed = cups * (it.packsPerCup || 1) + pots * (it.packsPerPot || 2);
            else stockUsed = cups * (it.gramsPerCup || 5) + pots * (it.gramsPerPot || 15);
            stockUsed = Math.round(stockUsed * 100) / 100;

            upd(function(db) {
                var it2 = db[cfg.key].find(function(i) { return i.id === id; });
                if (!it2) return;
                it2.purchases.push({ date: date, qty: -stockUsed, source: reason });
                it2.sales.push({ date: date, cups: cups, pots: pots, expectedAmount: expected, amount: amount });
            });
            closeModal();
            toast('销售 ' + cups + '杯' + pots + '壶 应收:' + expected.toFixed(2) + ' 实收:' + amount.toFixed(2));
        } else if (type === 'cig') {
            var qty = parseInt($id('mvQty').value) || 0;
            var amount = parseFloat($id('mvAmount').value) || 0;
            if (qty <= 0) { toast('填数量'); return; }
            upd(function(db) {
                var it = db[cfg.key].find(function(i) { return i.id === id; });
                if (!it) return;
                it.purchases.push({ date: date, qty: -qty, source: reason });
                it.sales.push({ date: date, qty: qty, amount: amount });
            });
            closeModal();
            toast('销售 ' + qty + '包 ' + amount.toFixed(2) + '元');
        } else {
            var qty = parseInt($id('mvQty').value) || 0;
            var amount = parseFloat($id('mvAmount').value) || 0;
            if (qty <= 0) { toast('填数量'); return; }
            upd(function(db) {
                var it = db[cfg.key].find(function(i) { return i.id === id; });
                if (!it) return;
                it.purchases.push({ date: date, qty: -qty, source: reason });
                it.sales.push({ date: date, qty: qty, amount: amount });
            });
            closeModal();
            toast('销售 ' + qty + '瓶 ' + amount.toFixed(2) + '元');
        }
    }
    rInv(type);
}

// 自动计算成本/克 或 成本/包
function autoCalcCost(mode) {
    if (mode === 'gram') {
        var os = parseFloat($id('ai_os_g').value) || 0;
        var ov = parseFloat($id('ai_ov_g').value) || 0;
        if (os > 0 && ov > 0) $id('ai_costPerGram').value = (Math.round(ov / os * 1000) / 1000).toFixed(3);
    } else {
        var os = parseFloat($id('ai_os_p').value) || 0;
        var ov = parseFloat($id('ai_ov_p').value) || 0;
        if (os > 0 && ov > 0) $id('ai_cpp').value = (Math.round(ov / os * 100) / 100).toFixed(2);
    }
}

// 保存库存商品（新建或编辑）
function doAddInv(type, itemId) {
    var cfg = INV[type];
    var name = ($id('ai_name').value || '').trim();
    if (!name) { toast('填名称'); return; }

    if (type === 'tea') {
        var mode = $id('ai_mode').value;
        if (itemId) {
            // 编辑
            upd(function(db) {
                var it = db[cfg.key].find(function(i) { return i.id === itemId; });
                if (!it) return;
                it.name = name; it.calcMode = mode;
                if (mode === 'gram') {
                    it.costPerGram = parseFloat($id('ai_costPerGram').value) || 0;
                    it.gramsPerCup = parseFloat($id('ai_gpc').value) || 5;
                    it.gramsPerPot = parseFloat($id('ai_gpp').value) || 15;
                    it.pricePerCup = parseFloat($id('ai_ppc').value) || 0;
                    it.pricePerPot = parseFloat($id('ai_ppp').value) || 0;
                    it.openingStock = parseFloat($id('ai_os_g2').value) || 0;
                    it.restockAlert = parseInt($id('ai_ra_g').value) || 0;
                } else {
                    it.gramsPerPack = parseFloat($id('ai_gpk').value) || 250;
                    it.costPerPack = parseFloat($id('ai_cpp').value) || 0;
                    it.packsPerCup = parseFloat($id('ai_ppcup').value) || 1;
                    it.packsPerPot = parseFloat($id('ai_pppot').value) || 2;
                    it.pricePerCup = parseFloat($id('ai_ppc2').value) || 0;
                    it.pricePerPot = parseFloat($id('ai_ppp2').value) || 0;
                    it.openingStock = parseFloat($id('ai_os_p2').value) || 0;
                    it.restockAlert = parseInt($id('ai_ra_p').value) || 0;
                }
            });
            toast('已更新');
        } else {
            // 新建
            var item = { id: type + '_' + Date.now(), name: name, calcMode: mode, sales: [], purchases: [] };
            if (mode === 'gram') {
                item.costPerGram = parseFloat($id('ai_costPerGram').value) || 0;
                item.gramsPerCup = parseFloat($id('ai_gpc').value) || 5;
                item.gramsPerPot = parseFloat($id('ai_gpp').value) || 15;
                item.pricePerCup = parseFloat($id('ai_ppc').value) || 0;
                item.pricePerPot = parseFloat($id('ai_ppp').value) || 0;
                item.openingStock = parseFloat($id('ai_os_g2').value) || 0;
                item.restockAlert = parseInt($id('ai_ra_g').value) || 0;
            } else {
                item.gramsPerPack = parseFloat($id('ai_gpk').value) || 250;
                item.costPerPack = parseFloat($id('ai_cpp').value) || 0;
                item.packsPerCup = parseFloat($id('ai_ppcup').value) || 1;
                item.packsPerPot = parseFloat($id('ai_pppot').value) || 2;
                item.pricePerCup = parseFloat($id('ai_ppc2').value) || 0;
                item.pricePerPot = parseFloat($id('ai_ppp2').value) || 0;
                item.openingStock = parseFloat($id('ai_os_p2').value) || 0;
                item.restockAlert = parseInt($id('ai_ra_p').value) || 0;
            }
            upd(function(db) { db[cfg.key].push(item); });
            toast('已添加');
        }
    } else {
        if (itemId) {
            upd(function(db) {
                var it = db[cfg.key].find(function(i) { return i.id === itemId; });
                if (!it) return;
                it.name = name;
                it.costPerUnit = parseFloat($id('ai_costPerUnit').value) || 0;
                it.pricePerUnit = parseFloat($id('ai_pricePerUnit').value) || 0;
                it.openingStock = parseFloat($id('ai_os').value) || 0;
                it.restockAlert = parseInt($id('ai_ra').value) || 0;
                var pu = $id('ai_pu'); if (pu) it.purchaseUnit = pu.value;
                var cr = $id('ai_cr'); if (cr) it.purchaseConvRatio = parseInt(cr.value) || 10;
            });
            toast('已更新');
        } else {
            var item = {
                id: type + '_' + Date.now(), name: name,
                costPerUnit: parseFloat($id('ai_costPerUnit').value) || 0,
                pricePerUnit: parseFloat($id('ai_pricePerUnit').value) || 0,
                openingStock: parseFloat($id('ai_os').value) || 0,
                restockAlert: parseInt($id('ai_ra').value) || 0,
                sales: [], purchases: []
            };
            var pu = $id('ai_pu');
            item.purchaseUnit = pu ? pu.value : (type === 'cig' ? '条' : '箱');
            var cr = $id('ai_cr');
            item.purchaseConvRatio = cr ? parseInt(cr.value) || 10 : (type === 'cig' ? 10 : 12);
            upd(function(db) { db[cfg.key].push(item); });
            toast('已添加');
        }
    }
    closeModal();
    rInv(type);
}

});

// 单个商品进销存计算
function invCalc(item, type) {
    // 总入库数量（采购/进货）
    var tp = item.purchases.reduce(function(s, p) { return s + p.qty; }, 0);

    // ===== 茗茶计算 =====
    // 茗茶比较特殊：按杯/壶卖，按克/包进货
    // 两种计算模式：'pack'（按包）和 'weight'（按克）
    if (type === 'tea') {
        // 总销售杯数、壶数、总营收
        var tc = item.sales.reduce(function(s, r) { return s + (r.cups || 0); }, 0);
        var tp2 = item.sales.reduce(function(s, r) { return s + (r.pots || 0); }, 0);
        var rev = item.sales.reduce(function(s, r) { return s + r.amount; }, 0);

        var cost, stock;
        if (item.calcMode === 'pack') {
            // 按包计算：每杯用几包 × 包成本
            cost = (tc * (item.packsPerCup || 0) + tp2 * (item.packsPerPot || 0))
                 * (item.costPerPack || 0);
            stock = (item.openingStock || 0) + tp;
        } else {
            // 按克计算：每杯几克 × 每克成本
            cost = tc * (item.gramsPerCup || 0) * (item.costPerGram || 0)
                 + tp2 * (item.gramsPerPot || 0) * (item.costPerGram || 0);
            stock = (item.openingStock || 0) + tp;
        }

        return {
            stock: stock,       // 当前库存
            revenue: rev,       // 总销售额
            cost: cost,         // 总成本（FIFO近似）
            profit: rev - cost, // 毛利
            margin: rev > 0 ? (rev - cost) / rev * 100 : 0  // 毛利率%
        };
    }

    // ===== 香烟/酒类计算 =====
    // 按瓶/包卖，按瓶/包进货，计算简单
    var ts = item.sales.reduce(function(s, r) { return s + (r.qty || 0); }, 0);  // 总销售数量
    var rev = item.sales.reduce(function(s, r) { return s + r.amount; }, 0);      // 总营收
    var cost = ts * (item.costPerUnit || 0);  // 总成本 = 销售数量 × 单位成本

    return {
        stock: (item.openingStock || 0) + tp - ts,  // 期初 + 入库 - 销售
        revenue: rev,
        cost: cost,
        profit: rev - cost,
        margin: rev > 0 ? (rev - cost) / rev * 100 : 0
    };
}

// 月度进销存计算
function invCalcMon(item, type, ym) {
    // 筛选出该月份的销售记录
    var sales = item.sales.filter(function(s) { return s.date && s.date.startsWith(ym); });
    var revenue = 0, cost = 0;

    if (type === 'tea') {
        // 茗茶：按杯/壶计算成本
        sales.forEach(function(s) {
            revenue += (s.amount || 0);
            cost += ((s.cups || 0) * (item.gramsPerCup || 5)
                   + (s.pots || 0) * (item.gramsPerPot || 15))
                   * (item.costPerGram || 0);
        });
    } else {
        // 香烟/酒类：按数量计算成本
        sales.forEach(function(s) {
            revenue += (s.amount || 0);
            cost += (s.qty || 0) * (item.costPerUnit || 0);
        });
    }

    return {
        revenue: revenue,  // 本月营收
        cost: cost,        // 本月成本
        actual: revenue    // 实收（目前等于营收）
    };
}

// 保存编辑后的仓库物品信息
function doEditWH(id) {
    var n = document.getElementById('ewh_n').value.trim();
    if (!n) { toast('填品名'); return; }
    upd(function(db) {
        var it = db.whItems.find(function(i) { return i.id === id; });
        if (!it) return;
        it.name = n;
        it.category = document.getElementById('ewh_c').value.trim() || '未分类';
        it.unit = document.getElementById('ewh_u').value.trim() || '个';
        it.stock = parseInt(document.getElementById('ewh_s').value) || 0;
        it.safeStock = parseInt(document.getElementById('ewh_ss').value) || 0;
    });
    closeModal();
    toast('已更新');
    rWH();
}

// 删除仓库物品
function delWH(id) {
    if (!confirm('删除？')) return;
    upd(function(db) {
        db.whItems = db.whItems.filter(function(i) { return i.id !== id; });

// 执行入库/出库操作，更新库存和记录
function doWhMoveAll(dir) {
    var itemId = document.getElementById('mvItem').value;
    var qty = parseInt(document.getElementById('whQty').value);
    if (isNaN(qty) || qty <= 0) { toast('填数量'); return; }
    var date = document.getElementById('whDate').value || td();
    var reason = document.getElementById('whReason').value || '';

    upd(function(db) {
        var it = db.whItems.find(function(i) { return i.id === itemId; });
        if (!it) return;
        if (!it.movements) it.movements = [];
        it.movements.push({ date: date, qty: dir > 0 ? qty : -qty, reason: reason });
        it.stock = Math.max(0, it.stock + dir * qty);
    });
    closeModal();
    toast((dir > 0 ? '入库' : '出库') + ' ' + qty);
    rWH();
}

    if (!item) return;

    var h = '<h3>' + item.name + ' · 出入库明细</h3>';

        h += '<div class="tw"><table>';

        moves.forEach(function(m) {

            h += '<tr>';
            h += '<td>' + m.date + '</td>';
            h += '<td><span class="badge ' + (isIn ? 'gn' : 'rd') + '">' + (isIn ? '入库' : '出库') + '</span></td>';
            h += '<td class="nr">' + Math.abs(m.qty) + item.unit + '</td>';

// 添加报损记录
function doAddDmg() {
    var itemSel = $id('dmgItem').value;
    if (!itemSel) { toast('选物品'); return; }

    // 获取物品名称
    var itemName = '', itemId = '';
    if (itemSel === '_other') {
        // 手动输入的物品名
        itemName = $id('dmgName').value.trim();
        if (!itemName) { toast('填物品名'); return; }
    } else {
        // 从库存列表中查找
        itemId = itemSel;
        var src = $id('dmgSource').value;
        var list = null;
        if (src === '茗茶') list = DB.teaItems;
        else if (src === '香烟') list = DB.cigItems;
        else if (src === '酒类') list = DB.alcItems;
        else if (src === '仓库') list = DB.whItems;

        if (list) {
            var it = list.find(function(i) { return i.id === itemSel; });
            itemName = it ? it.name : '';
        }
    }
    if (!itemName) { toast('物品无效'); return; }

    var qty = parseInt($id('dmgQty').value) || 0;
    if (qty <= 0) { toast('填数量'); return; }

    upd(function(db) {
        db.damageRecords.push({
            id: 'dmg_' + Date.now(),
            date: $id('dmgDate').value || td(),
            category: $id('dmgSource').value || '其他',
            itemId: itemId,
            itemName: itemName,
            qty: qty,
            unit: $id('dmgUnit').value.trim(),
            reason: $id('dmgReason').value.trim(),
            photoFile: _dmgPhotoData || ''
        });
    });

    _dmgPhotoData = null;
    toast('已记录 ' + itemName + ' ' + qty);
    rDamage();
}

// 删除报损记录

    upd(function(db) {
        db.damageRecords = db.damageRecords.filter(function(d) { return d.id !== id; });
    });

}

// 月度财务报告主页：核心指标 + 子标签导航 + 多维度报表
function rReport() {
    var ym = curYM();

    // 月份选择器
    var h = '<div class="hrow"><label>月份</label>';
    h += '<input class="inp" id="repM" type="month" value="' + ym + '" style="max-width:180px" onchange="rReport()">';
    h += '</div>';

    var m = $id('repM') ? $id('repM').value || ym : ym;
    var mr = getMR(m);

    // ===== 营收汇总 =====
    var mNet = mr.reduce(function(s, r) { return s + (r.revenue.netSales || 0); }, 0);
    var mGross = mr.reduce(function(s, r) { return s + (r.revenue.grossSales || 0); }, 0);
    var mKit = mr.reduce(function(s, r) { return s + (r.revenue.kitchenSales || 0); }, 0);
    var mBar = mr.reduce(function(s, r) { return s + (r.revenue.barSales || 0); }, 0);
    var mDel = mr.reduce(function(s, r) { return s + (r.delivery.total || 0); }, 0);
    var mCigRev = mr.reduce(function(s, r) { return s + (r.revenue.cigarette.total || 0); }, 0);
    var mOther = mr.reduce(function(s, r) { return s + (r.revenue.other || 0); }, 0);
    var mDiscount = mr.reduce(function(s, r) { return s + (r.revenue.discount || 0); }, 0);
    var mGuests = mr.reduce(function(s, r) { return s + (r.guest.count || 0); }, 0);

    // ===== 支付方式汇总 =====
    var mPos = mr.reduce(function(s, r) { return s + (r.payment.pos || 0); }, 0);
    var mCcb = mr.reduce(function(s, r) { return s + (r.payment.ccbLife || 0); }, 0);
    var mCash = mr.reduce(function(s, r) { return s + (r.payment.cash || 0); }, 0);
    var mMember = mr.reduce(function(s, r) { return s + (r.payment.memberCard || 0); }, 0);
    var mTreat = mr.reduce(function(s, r) { return s + (r.payment.treat || 0); }, 0);
    var mAr = mr.reduce(function(s, r) { return s + (r.payment.ar.total || 0); }, 0);

    // ===== 外卖渠道汇总 =====
    var mDelMeituan = mr.reduce(function(s, r) { return s + (r.delivery.meituan || 0); }, 0);
    var mDelTaobao = mr.reduce(function(s, r) { return s + (r.delivery.taobao || 0); }, 0);
    var mDelJd = mr.reduce(function(s, r) { return s + (r.delivery.jd || 0); }, 0);

    // ===== 库存销售统计 =====
    var teaS = DB.teaItems.map(function(item) {
        var mc = invCalcMon(item, 'tea', m);
        return { item: item, revenue: mc.revenue, cost: mc.cost, profit: mc.revenue - mc.cost };
    });
    var cigS = DB.cigItems.map(function(item) {
        var mc = invCalcMon(item, 'cig', m);
        return { item: item, revenue: mc.revenue, cost: mc.cost, profit: mc.revenue - mc.cost };
    });
    var alcS = DB.alcItems.map(function(item) {
        var mc = invCalcMon(item, 'alc', m);
        return { item: item, revenue: mc.revenue, cost: mc.cost, profit: mc.revenue - mc.cost };
    });

    var teaRev = teaS.reduce(function(s, st) { return s + st.revenue; }, 0);
    var teaCost = teaS.reduce(function(s, st) { return s + st.cost; }, 0);
    var teaProfit = teaRev - teaCost;

    var cigRev = cigS.reduce(function(s, st) { return s + st.revenue; }, 0);
    var cigCost = cigS.reduce(function(s, st) { return s + st.cost; }, 0);
    var cigProfit = cigRev - cigCost;

    var alcRev = alcS.reduce(function(s, st) { return s + st.revenue; }, 0);
    var alcCost = alcS.reduce(function(s, st) { return s + st.cost; }, 0);
    var alcProfit = alcRev - alcCost;

    // ===== 采购汇总 =====
    var mPur = DB.purchases.filter(function(p) { return p.date.startsWith(m); });
    var purTotal = 0, retTotal = 0, purBySec = {};
    mPur.forEach(function(p) {
        p.items.forEach(function(item) {
            var src = item.source || p.source || '外购';
            var sec = item.section || '其他';
            if (src === '退货') {
                retTotal += item.total;
            } else {
                purTotal += item.total;
                if (!purBySec[sec]) purBySec[sec] = 0;
                purBySec[sec] += item.total;
            }
        });
    });
    var netPur = purTotal - retTotal;

    // ===== 费用汇总 =====
    var mExp = DB.expenses.filter(function(e) { return e.date.startsWith(m); });
    var expTotal = mExp.reduce(function(s, e) { return s + e.amount; }, 0);
    var expByCat = {};
    mExp.forEach(function(e) {
        if (!expByCat[e.category]) expByCat[e.category] = 0;
        expByCat[e.category] += e.amount;
    });

    // ===== 分区域成本 =====
    var kitCost = purBySec['厨房'] || 0;
    var barCost = purBySec['吧台'] || 0;
    var outCost = purBySec['外场'] || 0;
    var barNoTea = mBar - teaRev;
    if (barNoTea < 0) barNoTea = mBar;
    var otherCost = netPur - kitCost - barCost - outCost;
    if (otherCost < 0) otherCost = 0;

    // ===== 利润计算 =====
    var grossProfit = mNet - netPur;
    var grossMargin = mNet > 0 ? grossProfit / mNet * 100 : 0;
    var operProfit = grossProfit - expTotal;
    var operMargin = mNet > 0 ? operProfit / mNet * 100 : 0;

    // 分类毛利
    var barGP = barNoTea - barCost;
    var teaGP = teaProfit;
    var cigGP = cigProfit;
    var alcGP = alcProfit;
    var delGP = mDel;
    var kitGP = mKit - kitCost;
    if (kitGP < 0) kitGP = mKit * 0.5;
    var otherGP = mOther - otherCost;
    if (otherGP < 0) otherGP = mOther * 0.5;

    var avgSpend = mGuests > 0 ? mNet / mGuests : 0;
    var daysReported = mr.length || 1;
    var yy = m.split('-')[0];
    var mm = m.split('-')[1];

    // 页面标题
    h += '<div class="sec" style="text-align:center;margin-bottom:4px">';
    h += '<div style="font-size:1.2rem;font-weight:700;color:var(--ac);letter-spacing:.05em">岸香咖啡弘皓大厦店</div>';
    h += '<div style="font-size:.78rem;color:var(--tx-m);letter-spacing:.1em">FINANCIAL REPORT · ' + yy + '.' + mm + '</div>';
    h += '</div>';

    // 核心指标卡片
    h += '<div class="cards" style="margin-bottom:20px">';
    h += '<div class="card"><div class="card-l">总流水</div><div class="card-v ac">' + fmtC(mGross) + '</div></div>';
    h += '<div class="card"><div class="card-l">总实收</div><div class="card-v ac">' + fmtC(mNet) + '</div></div>';
    h += '<div class="card"><div class="card-l">总毛利</div><div class="card-v gn">' + fmtC(grossProfit) + '</div></div>';
    h += '<div class="card"><div class="card-l">毛利率</div><div class="card-v gn">' + grossMargin.toFixed(1) + '%</div></div>';
    h += '<div class="card"><div class="card-l">营业利润</div><div class="card-v ' + (operProfit >= 0 ? 'gn' : 'rd') + '">' + fmtC(operProfit) + '</div></div>';
    h += '<div class="card"><div class="card-l">到店人数</div><div class="card-v">' + mGuests + '</div></div>';
    h += '</div>';

    // 子标签导航栏
    h += '<div class="rep-nav" id="repNav" style="display:flex;gap:0;overflow-x:auto;margin-bottom:20px;background:var(--card);border:1px solid var(--bd);border-radius:var(--r);scrollbar-width:none"></div>';
    h += '<div id="repBody"></div>';

    setMain('财务报告', h);

    // 子标签配置
    var tabs = [
        { id: 'profit', label: '利润表' },
        { id: 'revenue', label: '营收总表' },
        { id: 'cost', label: '成本费用' },
        { id: 'catgp', label: '分类毛利' }
    ];
    if (cigRev > 0) tabs.push({ id: 'cig', label: '香烟' });
    if (teaRev > 0) tabs.push({ id: 'tea', label: '茗茶' });
    if (alcRev > 0) tabs.push({ id: 'alc', label: '酒类' });
    tabs.push({ id: 'daily', label: '每日营收' });
    tabs.push({ id: 'guest', label: '客情包厢' });

    // 渲染子标签按钮
    var navH = '';
    tabs.forEach(function(t, i) {
        navH += '<button class="rep-tab' + (i === 0 ? ' active' : '') + '" data-tab="' + t.id + '" ';
        navH += 'style="flex-shrink:0;padding:10px 16px;font-size:.76rem;color:var(--tx-m);';
        navH += 'background:none;border:none;border-bottom:2px solid transparent;';
        navH += 'cursor:pointer;transition:all .2s;white-space:nowrap">';
        navH += t.label + '</button>';
    });
    $id('repNav').innerHTML = navH;

    // 子标签切换逻辑
    function switchRepTab(id) {
        document.querySelectorAll('.rep-tab').forEach(function(b) {
            b.classList.toggle('active', b.dataset.tab === id);
            b.style.color = b.classList.contains('active') ? 'var(--ac)' : 'var(--tx-m)';
            b.style.borderBottomColor = b.classList.contains('active') ? 'var(--ac)' : 'transparent';
        });
        renderRepSection(id);
    }

    document.querySelectorAll('.rep-tab').forEach(function(b) {
        b.onclick = function() { switchRepTab(b.dataset.tab); };
    });

    // 渲染子标签内容（闭包可访问所有汇总变量）
    function renderRepSection(id) {
        var s = $id('repBody');
        if (!s) return;

        // 缓存数据给图表使用
        window._repData = {
            net: mNet, netPur: netPur, gp: grossProfit,
            expTotal: expTotal, op: operProfit,
            kit: mKit, bar: mBar, del: mDel,
            cig: cigRev, alc: alcRev, other: mOther,
            pos: mPos, ccb: mCcb, cash: mCash,
            member: mMember, ar: mAr,
            purBySec: purBySec, expByCat: expByCat,
            kitGP: kitGP, barGP: barGP, teaGP: teaGP,
            delGP: delGP, cigGP: cigGP, alcGP: alcGP,
            barNoTea: barNoTea, tea: teaRev,
            cigS: cigS, teaS: teaS, alcS: alcS,
            mr: mr
        };

        var sh = '';
        if (id === 'profit') {
            sh += renderProfitTable(mNet, mGross, mDiscount, kitCost, barCost, outCost, teaCost, cigCost, alcCost, otherCost, netPur, expTotal, expByCat, grossProfit, grossMargin, operProfit, operMargin);
        } else if (id === 'revenue') {
            sh += renderRevenueSection(mNet, mGross, mDiscount, mKit, mBar, mDel, mCigRev, alcRev, mOther, mPos, mCcb, mCash, mMember, mTreat, mAr, mDelMeituan, mDelTaobao, mDelJd);
        } else if (id === 'cost') {
            sh += renderCostSection(purBySec, netPur, kitCost, barCost, outCost, teaCost, cigCost, alcCost, expByCat, expTotal);
        } else if (id === 'catgp') {
            sh += renderCatGPSection(mKit, mBar, barNoTea, teaRev, mDel, mCigRev, alcRev, kitCost, barCost, teaCost, cigCost, alcCost, kitGP, barGP, teaGP, delGP, cigGP, alcGP);
        } else if (id === 'cig') {
            sh += renderCigSection(cigS, cigRev, cigCost, cigProfit, m);
        } else if (id === 'tea') {
            sh += renderTeaSection(teaS, teaRev, teaCost, teaProfit, m);
        } else if (id === 'alc') {
            sh += renderAlcSection(alcS, alcRev, alcCost, alcProfit, m);
        } else if (id === 'daily') {
            sh += renderDailySection(mr, mNet, mGuests, daysReported);
        } else if (id === 'guest') {
            sh += renderGuestSection(mr, mGuests, m);
        }

        s.innerHTML = sh;
        setTimeout(function() { initRepCharts(id); }, 100);
    }
}

// ==================== 利润表 ====================
function renderProfitTable(net, gross, discount, kitC, barC, outC, teaC, cigC, alcC, otherC, netPur, expTotal, expByCat, gp, gm, op, om) {
    var ym = $id('repM') ? $id('repM').value : curYM();
    var yy = ym.split('-')[0];
    var mm = parseInt(ym.split('-')[1]);

    // 利润表数据行
    var rows = [
        { l: '营业收入（实收）', v: net, n: '流水' + fmtC(gross) + ' 减折扣' + fmtC(discount) },
        { l: '减：营业成本', v: netPur, n: '净采购' },
        { l: '  厨房采购', v: kitC, n: '' },
        { l: '  吧台采购', v: barC, n: '' },
        { l: '  外场采购', v: outC, n: '' },
        { l: '  茗茶FIFO成本', v: teaC, n: '' },
        { l: '  香烟销售成本', v: cigC, n: '' },
        { l: '  酒类FIFO成本', v: alcC, n: '' }
    ];
    if (otherC > 0) rows.push({ l: '  其他采购', v: otherC, n: '' });
    rows.push({ l: '毛利', v: gp, n: '毛利率 ' + gm.toFixed(1) + '%' });
    rows.push({ l: '减：营业费用', v: expTotal, n: '' });
    Object.keys(expByCat).forEach(function(cat) { rows.push({ l: '  ' + cat, v: expByCat[cat], n: '' }); });
    rows.push({ l: '营业利润', v: op, n: '利润率 ' + om.toFixed(1) + '%' });

    // 标题摘要
    var h = '<div class="sec-head">';
    h += '<h4 style="font-size:.88rem;color:var(--ac);margin-bottom:6px">一、利润表</h4>';
    h += '<div style="font-size:.72rem;color:var(--tx-m);margin-bottom:14px">';
    h += mm + '月实现营收' + fmtC(net) + '元，营业成本' + fmtC(netPur) + '元，';
    h += '毛利' + fmtC(gp) + '元（' + gm.toFixed(1) + '%）。';
    h += '扣除费用' + fmtC(expTotal) + '元后，营业利润' + fmtC(op) + '元，利润率' + om.toFixed(1) + '%。';
    h += '</div></div>';

    // 图表
    h += '<div style="background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:14px">';
    h += '<canvas id="repChart" height="160"></canvas></div>';

    // 表格
    h += '<div class="tw"><table>';
    h += '<tr><th>项目</th><th class="nr">金额（元）</th><th>备注</th></tr>';
    rows.forEach(function(r) {
        var isTotal = (r.l === '毛利' || r.l === '营业利润');
        h += '<tr' + (isTotal ? ' style="background:var(--card-h)"' : '') + '>';
        h += '<td' + (isTotal ? ' style="font-weight:600"' : '') + '>' + r.l + '</td>';
        h += '<td class="nr" style="' + (isTotal ? 'font-weight:600;color:' + (r.v >= 0 ? 'var(--gn)' : 'var(--rd)') : '') + '">' + fmtC(r.v) + '</td>';
        h += '<td style="font-size:.72rem;color:var(--tx-m)">' + r.n + '</td></tr>';
    });
    h += '</table></div>';
    return h;
}

// ---------- 生成报告 ----------
function doGen(period) {
    var m = ($id('genM') || {}).value || curYM();
    var sd = 1, ed = 31;
    var title = m.replace('-', '年') + '月';

    if (period === 'first') {
        ed = 15;
        title += '上半月';
    } else if (period === 'second') {
        sd = 16;
        title += '下半月';
    } else if (period === 'custom') {
        var startVal = $id('genStart').value;
        var endVal = $id('genEnd').value;
        if (!startVal || !endVal) { toast('请选择起止日期'); return; }
        sd = parseInt(startVal.split('-')[2]);
        ed = parseInt(endVal.split('-')[2]);
        title = startVal.replace(/-/g, '/') + ' - ' + endVal.replace(/-/g, '/');
    } else {
        title += '月度';
    }
    title += '经营报告';

    // 筛选日期范围内的日报
    var mr = getMR(m).filter(function(r) {
        var d = parseInt(r.date.split('-')[2]);
        return d >= sd && d <= ed;
    });

    var days = mr.length || 1;
    var mNet = mr.reduce(function(s, r) { return s + (r.revenue.netSales || 0); }, 0);
    var mGross = mr.reduce(function(s, r) { return s + (r.revenue.grossSales || 0); }, 0);
    var mDiscount = mr.reduce(function(s, r) { return s + (r.revenue.discount || 0); }, 0);
    var mKit = mr.reduce(function(s, r) { return s + (r.revenue.kitchenSales || 0); }, 0);
    var mBar = mr.reduce(function(s, r) { return s + (r.revenue.barSales || 0); }, 0);
    var mDel = mr.reduce(function(s, r) { return s + (r.delivery.total || 0); }, 0);
    var mCig = mr.reduce(function(s, r) { return s + (r.revenue.cigarette.total || 0); }, 0);
    var mOther = mr.reduce(function(s, r) { return s + (r.revenue.other || 0); }, 0);
    var mGuests = mr.reduce(function(s, r) { return s + (r.guest.count || 0); }, 0);
    var mPos = mr.reduce(function(s, r) { return s + (r.payment.pos || 0); }, 0);
    var mCcb = mr.reduce(function(s, r) { return s + (r.payment.ccbLife || 0); }, 0);
    var mCash = mr.reduce(function(s, r) { return s + (r.payment.cash || 0); }, 0);
    var mMember = mr.reduce(function(s, r) { return s + (r.payment.memberCard || 0); }, 0);
    var mTreat = mr.reduce(function(s, r) { return s + (r.payment.treat || 0); }, 0);
    var mAr = mr.reduce(function(s, r) { return s + (r.payment.ar.total || 0); }, 0);
    var mRooms = mr.reduce(function(s, r) { return s + (r.guest.premiumRoomsToday || 0); }, 0);

    // 采购（筛选日期范围）
    var mPur = DB.purchases.filter(function(p) {
        var d = parseInt(p.date.split('-')[2]);
        return p.date.startsWith(m) && d >= sd && d <= ed;
    }).reduce(function(s, p) { return s + p.items.reduce(function(ss, i) { return ss + i.total; }, 0); }, 0);

    // 费用（筛选日期范围）
    var mExp = DB.expenses.filter(function(e) {
        var d = parseInt(e.date.split('-')[2]);
        return e.date.startsWith(m) && d >= sd && d <= ed;
    }).reduce(function(s, e) { return s + e.amount; }, 0);

    var profit = mNet - mPur - mExp;
    var profitRate = mNet > 0 ? (profit / mNet * 100).toFixed(1) : '0';
    var avgNet = mNet / days;
    var avgGuests = mGuests / days;
    var avgSpend = mGuests > 0 ? mNet / mGuests : 0;
    var costRate = mNet > 0 ? (mPur / mNet * 100).toFixed(1) : '0';
    var discountRate = mGross > 0 ? (mDiscount / mGross * 100).toFixed(1) : '0';

    // 每日明细行
    var dailyRows = '';
    var sorted = mr.slice().sort(function(a, b) { return a.date.localeCompare(b.date); });
    sorted.forEach(function(r) {
        var d = parseInt(r.date.split('-')[2]);
        var ppg = r.guest.count > 0 ? (r.revenue.netSales / r.guest.count).toFixed(0) : '-';
        var net = r.revenue.netSales || 0;
        var color = profit >= 0 ? '#3d8b5e' : '#c75450';
        dailyRows += '<tr>';
        dailyRows += '<td>' + d + '日</td>';
        dailyRows += '<td>' + num(r.revenue.grossSales || 0) + '</td>';
        dailyRows += '<td>' + num(r.revenue.discount || 0) + '</td>';
        dailyRows += '<td style="font-weight:600">' + num(net) + '</td>';
        dailyRows += '<td>' + num(r.revenue.kitchenSales || 0) + '</td>';
        dailyRows += '<td>' + num(r.revenue.barSales || 0) + '</td>';
        dailyRows += '<td>' + num(r.delivery.total || 0) + '</td>';
        dailyRows += '<td>' + (r.guest.count || 0) + '</td>';
        dailyRows += '<td>' + ppg + '</td>';
        dailyRows += '</tr>';
    });

    // 采购分类汇总
    var purBySec = {};
    DB.purchases.filter(function(p) {
        var d = parseInt(p.date.split('-')[2]);
        return p.date.startsWith(m) && d >= sd && d <= ed;
    }).forEach(function(p) {
        p.items.forEach(function(item) {
            var sec = item.section || '其他';
            if (!purBySec[sec]) purBySec[sec] = 0;
            purBySec[sec] += item.total;
        });
    });

    var purRows = '';
    Object.keys(purBySec).sort(function(a, b) { return purBySec[b] - purBySec[a]; }).forEach(function(sec) {
        var pct = mPur > 0 ? (purBySec[sec] / mPur * 100).toFixed(1) : '0';
        purRows += '<tr><td>' + sec + '</td><td>' + num(purBySec[sec]) + '</td><td>' + pct + '%</td></tr>';
    });

    // 费用分类汇总
    var expByCat = {};
    DB.expenses.filter(function(e) {
        var d = parseInt(e.date.split('-')[2]);
        return e.date.startsWith(m) && d >= sd && d <= ed;
    }).forEach(function(e) {
        if (!expByCat[e.category]) expByCat[e.category] = 0;
        expByCat[e.category] += e.amount;
    });

    var expRows = '';

// ---------- MiMo 通用对话 ----------
function mimoChat(prompt, callback, opts) {
    var ep = localStorage.getItem('ax_mimo_ep');
    var key = localStorage.getItem('ax_mimo_key');
    var model = localStorage.getItem('ax_mimo_model') || 'mimo-v2.5';
    if (!ep || !key) { toast('请先在设置页配置MiMo API'); callback(null); return; }

    var body = {
        model: model,
        messages: [{ role: 'user', content: prompt }],
        max_tokens: (opts && opts.max_tokens) || 4096,
        temperature: (opts && opts.temperature !== undefined) ? opts.temperature : 0.3
    };

    var h = '<div style="text-align:center;padding:10px">';
    h += '<div style="font-size:.88rem;font-weight:700;margin-bottom:8px">确认发送到MiMo分析？</div>';
    h += '<div style="font-size:.72rem;color:var(--tx-m);margin-bottom:14px">模型: ' + model + ' · 将消耗Token</div>';
    h += '<div class="brow"><button class="btn p" onclick="doMimoRequest()">确认分析</button> <button class="btn" onclick="closeModal()">取消</button></div>';
    h += '</div>';
    showModal(h, 400);

    window._pendingMimoBody = body;
    window._pendingMimoEp = ep;
    window._pendingMimoKey = key;
    window._pendingMimoCallback = callback;
}

function doMimoRequest() {
    closeModal();
    var body = window._pendingMimoBody;
    var ep = window._pendingMimoEp;
    var key = window._pendingMimoKey;
    var callback = window._pendingMimoCallback;
    if (!body || !callback) return;

    showAILoading();
    var xhr = new XMLHttpRequest();
    xhr.open('POST', ep, true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.setRequestHeader('Authorization', 'Bearer ' + key);
    xhr.timeout = 120000;
    xhr.onload = function() {
        hideAILoading();
        try {
            var data = JSON.parse(xhr.responseText);
            if (data.choices && data.choices[0]) callback(data.choices[0].message.content || '');
            else if (data.error) { toast('API错误: ' + (data.error.message || JSON.stringify(data.error))); callback(null); }
            else callback(null);
        } catch (e) { toast('返回格式异常'); callback(null); }
    };
    xhr.onerror = function() { hideAILoading(); toast('请求失败，请检查网络'); callback(null); };
    xhr.ontimeout = function() { hideAILoading(); toast('请求超时'); callback(null); };
    xhr.send(JSON.stringify(body));
}

// ---------- MiMo 视觉API（图片识别）----------
function mimoOCR(base64Img, callback) {
    var ep = localStorage.getItem('ax_mimo_ep');
    var key = localStorage.getItem('ax_mimo_key');
    var model = localStorage.getItem('ax_mimo_model') || 'mimo-v2.5-pro';
    if (!ep || !key) { toast('请先在设置中配置MiMo API'); return; }

    var prompt = '请识别这张采购单/出库单图片，提取所有商品信息。\n请严格按以下JSON格式返回，不要返回其他内容：\n\n{"date":"配送日期YYYY-MM-DD","source":"供应商名称","items":[{"name":"商品名称","qty":数字,"unit":"单位","unitPrice":单价,"total":金额}]}\n\n注意事项：\n1. 只返回JSON\n2. qty是发货数量\n3. 看不到就填0或空字符串\n4. 必须是合法JSON';

    var body = {
        model: model,
        messages: [{ role: 'user', content: [
            { type: 'text', text: prompt },
            { type: 'image_url', image_url: { url: 'data:image/jpeg;base64,' + base64Img } }
        ] }],
        max_tokens: 4096,
        temperature: 0.1
    };

    fetch(ep, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
        body: JSON.stringify(body)
    })
    .then(function(res) { return res.text(); })
    .then(function(text) {
        try {
            var data = JSON.parse(text);
            if (data.choices && data.choices[0]) callback(data.choices[0].message.content || '');
            else if (data.error) { toast('API错误: ' + (data.error.message || data.error)); callback(''); }
            else { toast('返回格式异常'); callback(''); }
        } catch (e) { toast('返回不是JSON'); callback(''); }
    })
    .catch(function(err) { toast('网络错误: ' + err.message); callback(''); });
}

// ---------- 解析AI返回的采购JSON ----------
function parseMimoResult(reply) {
    if (!reply) return null;
    var m = reply.match(/\{[\s\S]*\}/);
    if (!m) return null;
    try {
        var data = JSON.parse(m[0]);
        if (!data.items || !data.items.length) return null;
        var result = { date: data.date || td(), source: data.source || '外购', items: [] };
        data.items.forEach(function(item) {
            var qty = parseFloat(item.qty) || 0;
            var total = parseFloat(item.total) || 0;
            var unitPrice = parseFloat(item.unitPrice) || 0;
            if (!unitPrice && total > 0 && qty > 0) unitPrice = Math.round(total / qty * 100) / 100;
            if (qty > 0 && total > 0) {
                result.items.push({ name: item.name || '', section: item.section || '', category: '', qty: qty, unit: item.unit || '', unitPrice: unitPrice, total: total, source: result.source });
            }
        });
        if (/岸香.*贸易|贸易.*岸香/.test(result.source)) result.source = '岸香贸易';
        return result.items.length > 0 ? result : null;
    } catch (e) { console.error('JSON解析失败:', e); return null; }
}

// ---------- 简易Markdown转HTML ----------
function md2html(text) {
    if (!text) return '';
    var html = text;
    html = html.replace(/^####\s+(.+)$/gm, '<h4 style="font-size:.84rem;font-weight:700;margin:12px 0 6px;color:var(--ac)">$1</h4>');
    html = html.replace(/^###\s+(.+)$/gm, '<h3 style="font-size:.88rem;font-weight:700;margin:14px 0 6px;color:var(--ac)">$1</h3>');
    html = html.replace(/^##\s+(.+)$/gm, '<h2 style="font-size:.92rem;font-weight:700;margin:16px 0 8px;color:var(--ac)">$1</h2>');
    html = html.replace(/^#\s+(.+)$/gm, '<h1 style="font-size:1rem;font-weight:700;margin:18px 0 10px;color:var(--ac)">$1</h1>');
    html = html.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
    html = html.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<i>$1</i>');
    html = html.replace(/^[-•]\s+(.+)$/gm, '<div style="padding-left:16px;margin:2px 0">• $1</div>');
    html = html.replace(/^(\d+)\.\s+(.+)$/gm, '<div style="padding-left:16px;margin:2px 0">$1. $2</div>');

    // 表格
    var lines = html.split('\n');
    var inTable = false, tableLines = [], result = [];
    lines.forEach(function(line) {
        if (/^\|(.+)\|$/.test(line.trim())) {
            if (!inTable) { inTable = true; tableLines = []; }
            if (/^\|[\s\-:|]+\|$/.test(line.trim())) return;
            tableLines.push(line.trim().replace(/^\||\|$/g, '').split('|').map(function(c) { return c.trim(); }));
        } else {
            if (inTable) { result.push(buildTable(tableLines)); inTable = false; tableLines = []; }
            result.push(line);
        }
    });
    if (inTable) result.push(buildTable(tableLines));
    return result.join('\n');
}

function buildTable(rows) {
    if (!rows.length) return '';
    var h = '<table class="pur-tbl" style="margin:8px 0">';
    rows.forEach(function(row, idx) {
        h += '<tr>';
        row.forEach(function(cell) { h += '<' + (idx === 0 ? 'th' : 'td') + '>' + cell + '</' + (idx === 0 ? 'th' : 'td') + '>'; });
        h += '</tr>';
    });
    return h + '</table>';
}

// ---------- 构建月度数据摘要 ----------
function buildMonthSummary(ym) {
    var mr = getMR(ym);
    var mNet = mr.reduce(function(s, r) { return s + (r.revenue.netSales || 0); }, 0);
    var mKit = mr.reduce(function(s, r) { return s + (r.revenue.kitchenSales || 0); }, 0);
    var mBar = mr.reduce(function(s, r) { return s + (r.revenue.barSales || 0); }, 0);
    var mDel = mr.reduce(function(s, r) { return s + (r.delivery.total || 0); }, 0);
    var mGuests = mr.reduce(function(s, r) { return s + (r.guest.count || 0); }, 0);
    var days = mr.length;
    var mPur = DB.purchases.filter(function(p) { return p.date.startsWith(ym); })
        .reduce(function(s, p) { return s + p.items.reduce(function(ss, i) { return ss + i.total; }, 0); }, 0);
    var mExp = DB.expenses.filter(function(e) { return e.date.startsWith(ym); })
        .reduce(function(s, e) { return s + e.amount; }, 0);
    var lm = lastYM();
    var lNet = getMR(lm).reduce(function(s, r) { return s + (r.revenue.netSales || 0); }, 0);

    var dailyLines = [];
    mr.sort(function(a, b) { return a.date.localeCompare(b.date); });
    mr.forEach(function(r) {
        dailyLines.push(r.date + ' 实收' + (r.revenue.netSales || 0) + ' 厨房' + (r.revenue.kitchenSales || 0) + ' 吧台' + (r.revenue.barSales || 0) + ' 客流' + (r.guest.count || 0) + '人');
    });

    return [
        '月份: ' + ym, '经营天数: ' + days + '天', '实收总额: ' + mNet + '元',
        '厨房销售: ' + mKit + '元', '吧台销售: ' + mBar + '元', '外卖总额: ' + mDel + '元',
        '上月实收: ' + lNet + '元', '环比变化: ' + (lNet > 0 ? ((mNet - lNet) / lNet * 100).toFixed(1) : 0) + '%',
        '总客流: ' + mGuests + '人', '人均消费: ' + (mGuests > 0 ? (mNet / mGuests).toFixed(2) : 0) + '元',
        '采购总额: ' + mPur + '元', '费用总额: ' + mExp + '元',
        '净利润: ' + (mNet - mPur - mExp) + '元', '成本率: ' + (mNet > 0 ? (mPur / mNet * 100).toFixed(1) : 0) + '%',
        '', '每日明细:', dailyLines.join('\n')
    ].join('\n');
}

// ---------- 采购单识别（拍照）----------
function doAIParse() {
    if (!localStorage.getItem('ax_mimo_key')) { toast('请先在设置页配置MiMo API'); return; }

    var input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.capture = 'environment';
    input.onchange = function(e) {
        var file = e.target.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function(ev) {
            var img = new Image();
            img.onload = function() {
                var canvas = document.createElement('canvas');
                var maxW = window.innerWidth < 600 ? 1000 : 1600;
                var w = img.width, h = img.height;
                if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                var quality = window.innerWidth < 600 ? 0.6 : 0.85;
                var base64 = canvas.toDataURL('image/jpeg', quality).split(',')[1];

                var prompt = '请识别这张采购单/出库单图片，提取所有商品信息。\n图片中会标注区域信息（如厨房、吧台、外场），请将每个商品对应的区域填入section字段。\n请严格按以下JSON格式返回：\n\n{"date":"YYYY-MM-DD","source":"供应商名称","items":[{"name":"商品名称","qty":数字,"unit":"单位","unitPrice":单价,"total":金额,"section":"区域"}]}\n\n区域只能是：厨房、吧台、外场。无法判断则留空。只返回JSON。';

                var body = {
                    model: localStorage.getItem('ax_mimo_model') || 'mimo-v2.5',
                    messages: [{ role: 'user', content: [
                        { type: 'text', text: prompt },
                        { type: 'image_url', image_url: { url: 'data:image/jpeg;base64,' + base64 } }
                    ] }],
                    max_tokens: 4096, temperature: 0.1
                };

                var ep = localStorage.getItem('ax_mimo_ep');
                var key = localStorage.getItem('ax_mimo_key');
                var h2 = '<div style="text-align:center;padding:10px">';
                h2 += '<div style="font-size:.88rem;font-weight:700;margin-bottom:8px">确认识别这张图片？</div>';
                h2 += '<div class="brow"><button class="btn p" onclick="doAIParseGo()">确认识别</button> <button class="btn" onclick="closeModal()">取消</button></div></div>';
                showModal(h2, 400);
                window._pendingMimoBody = body;
                window._pendingMimoEp = ep;
                window._pendingMimoKey = key;
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    };
    input.click();
}

function doAIParseGo() {
    closeModal();
    showAILoading();
    var xhr = new XMLHttpRequest();
    xhr.open('POST', window._pendingMimoEp, true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.setRequestHeader('Authorization', 'Bearer ' + window._pendingMimoKey);
    xhr.timeout = 120000;
    xhr.onload = function() {
        hideAILoading();
        try {
            var data = JSON.parse(xhr.responseText);
            var reply = '';
            if (data.choices && data.choices[0]) reply = data.choices[0].message.content || '';
            if (!reply) { toast('AI返回为空'); return; }
            var m = reply.match(/\{[\s\S]*\}/);
            if (!m) { toast('AI未返回JSON'); return; }
            var result = JSON.parse(m[0]);
            if (!result.items || !result.items.length) { toast('未识别到商品'); return; }
            if (!result.date) result.date = td();
            var src = result.source || '';
            if (/岸香.*贸易|贸易.*岸香/.test(src)) src = '岸香贸易';
            else if (!src) src = '岸香贸易';

            var items = [];
            result.items.forEach(function(item) {
                var qty = parseFloat(item.qty) || 0, total = parseFloat(item.total) || 0, unitPrice = parseFloat(item.unitPrice) || 0;
                if (!unitPrice && total > 0 && qty > 0) unitPrice = Math.round(total / qty * 100) / 100;
                if (qty > 0 && total > 0) items.push({ name: item.name || '', section: item.section || '', category: '', qty: qty, unit: item.unit || '', unitPrice: unitPrice, total: total, source: src });
            });
            if (!items.length) { toast('解析结果为空'); return; }

            _pmItems = items.slice();
            goPage('purchase');
            setTimeout(function() {
                switchPT('manual');
                if (result.date && $id('pmDate')) $id('pmDate').value = result.date;
                if ($id('pmSrc')) {
                    for (var i = 0; i < $id('pmSrc').options.length; i++) {
                        if ($id('pmSrc').options[i].value === src) { $id('pmSrc').selectedIndex = i; break; }
                    }
                }
                renderPML();
                toast('已识别 ' + items.length + ' 项物品');
            }, 200);
        } catch (e) { toast('解析失败'); console.error(e); }
    };
    xhr.onerror = function() { hideAILoading(); toast('请求失败'); };
    xhr.ontimeout = function() { hideAILoading(); toast('请求超时'); };
    xhr.send(JSON.stringify(window._pendingMimoBody));
}

function saveAiDaily(mode) {
    var date = $id('aid_date').value || td();
    var report = {
        date: date,
        revenue: {
            grossSales: parseFloat($id('aid_gross').value) || 0, discount: 0,
            netSales: parseFloat($id('aid_net').value) || 0,
            kitchenSales: parseFloat($id('aid_kitchen').value) || 0,
            barSales: parseFloat($id('aid_bar').value) || 0,
            cigarette: { total: parseFloat($id('aid_cig').value) || 0, items: {} },
            other: parseFloat($id('aid_other').value) || 0, otherItems: {}
        },
        payment: {
            pos: parseFloat($id('aid_pos').value) || 0, ccbLife: 0,
            cash: parseFloat($id('aid_cash').value) || 0,
            memberCard: parseFloat($id('aid_member').value) || 0,
            ar: { total: 0, meituan: 0, douyin: 0 }, treat: 0
        },
        delivery: { total: 0, meituan: 0, taobao: 0, jd: 0 },
        guest: {
            count: parseInt($id('aid_count').value) || 0,
            avgSpend: parseFloat($id('aid_avg').value) || 0, premiumRoomsToday: 0
        },
        rooms: [], premiumRooms: { today: 0 }, teaSales: {}, cigSales: {}, alcSales: {},
        reporter: ($id('aid_reporter').value || '').trim()
    };

    upd(function(db) {
        if (mode === 'merge') {
            var existing = db.dailyReports.find(function(d) { return d.date === date; });
            if (existing) {
                Object.keys(report.revenue).forEach(function(k) { if (report.revenue[k] && typeof report.revenue[k] === 'number') existing.revenue[k] = report.revenue[k]; });
                Object.keys(report.payment).forEach(function(k) { if (report.payment[k] && typeof report.payment[k] === 'number') existing.payment[k] = report.payment[k]; });
                if (report.guest.count) existing.guest.count = report.guest.count;
                if (report.guest.avgSpend) existing.guest.avgSpend = report.guest.avgSpend;
                if (report.reporter) existing.reporter = report.reporter;
                return;
            }
        }
        var idx = db.dailyReports.findIndex(function(d) { return d.date === date; });
        if (idx >= 0) db.dailyReports[idx] = report;
        else db.dailyReports.push(report);
    });

    toast('日报已保存');
    closeModal();
}
