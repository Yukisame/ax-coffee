<style>
*{margin:0;padding:0;box-sizing:border-box}

.search-bar{background:var(--card);border-bottom:1px solid var(--bd);padding:10px 0;display:none;animation:slideDown .2s ease}.search-bar.show{display:block}@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}.search-inner{max-width:1060px;margin:0 auto;padding:0 20px;display:flex;gap:8px;align-items:center}.search-inner input{flex:1;background:var(--card-h);border:1px solid var(--bd);border-radius:6px;padding:9px 14px;font-family:var(--fb);font-size:.82rem;color:var(--tx);outline:none}.search-inner input:focus{border-color:var(--ac)}.search-close{background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--tx-m);padding:4px 8px;border-radius:4px}.search-close:hover{color:var(--tx);background:var(--card-h)}

.totals-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.pm-edit{background:var(--sf);border:1px solid var(--bd);border-radius:4px;font-size:.74rem;padding:4px 6px;width:100%;min-width:50px}.pm-edit:focus{border-color:var(--ac);outline:none}
.tag-btns{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;align-items:center}.tag-btn{padding:3px 10px;border-radius:12px;border:1px solid var(--bd);background:var(--card-h);color:var(--tx-s);font-family:var(--fb);font-size:.72rem;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent;touch-action:manipulation}.tag-btn:hover{border-color:var(--ac);color:var(--ac);background:var(--card)}

<header class="top-bar"><div class="top-inner"><div class="top-header"><h1>岸香咖啡</h1><div class="top-right"><span class="search-toggle" onclick="toggleSearch()">🔍</span><span id="syncInd" onclick="goPage('data')"></span><span id="headerDate"></span></div></div><nav class="top-nav" id="topNav"></nav></div></header>
<div class="search-bar" id="searchBar"><div class="search-inner"><input id="searchIn" type="text" placeholder="搜索..." oninput="scheduleSearch()"><button class="search-close" onclick="toggleSearch()">×</button></div></div>
<div class="search-results" id="searchResults"></div>
<main class="main" id="main"></main>
<div class="overlay" id="overlay" onclick="closeModal()"></div>
<div class="modal" id="modal"></div>
<div class="toast" id="toast"></div>
<script>var _curPage='dash';
// ===== GITHUB SYNC =====
var GH_KEY='ax_gh_cfg',_gh={token:'',gistId:'',mediaGistId:'',ready:false,saving:false};
function ghGetCfg(){try{return JSON.parse(localStorage.getItem(GH_KEY))||{}}catch(e){return{}}}
function ghSaveCfg(c){localStorage.setItem(GH_KEY,JSON.stringify(c))}
function ghInit(){var c=ghGetCfg();if(!c.token)return false;_gh.token=c.token;_gh.gistId=c.gistId||'';_gh.mediaGistId=c.mediaGistId||'';_gh.ready=true;return true}
async function ghFindGist(){if(!_gh.ready)return null;try{var pg=1;while(pg<=5){var r=await fetch('https://api.github.com/gists?per_page=100&page='+pg,{headers:{'Authorization':'token '+_gh.token}});if(!r.ok)return null;var gs=await r.json();if(!gs.length)break;for(var i=0;i<gs.length;i++){if(gs[i].description==='ax_cafe_data')return gs[i]}pg++}return null}catch(e){return null}}
async function ghLoad(){if(!_gh.ready||!_gh.gistId)return null;try{var r=await fetch('https://api.github.com/gists/'+_gh.gistId,{headers:{'Authorization':'token '+_gh.token}});if(!r.ok)return null;var g=await r.json();var f=g.files&&g.files['ax_cafe_data.json'];if(f&&f.content){var d=JSON.parse(f.content);if(d._ts&&d._ts>(DB._ts||0))return d}}catch(e){}return null}
async function ghSave(){if(!_gh.ready||!_gh.token||_gh.saving)return;_gh.saving=true;updSyncInd();DB._ts=Date.now();try{var url=_gh.gistId?'https://api.github.com/gists/'+_gh.gistId:'https://api.github.com/gists';var r=await fetch(url,{method:_gh.gistId?'PATCH':'POST',headers:{'Authorization':'token '+_gh.token,'Content-Type':'application/json'},body:JSON.stringify({description:'ax_cafe_data',files:{'ax_cafe_data.json':{content:JSON.stringify(DB)}}})});if(r.ok){var g=await r.json();if(!_gh.gistId){_gh.gistId=g.id;var c=ghGetCfg();c.gistId=g.id;ghSaveCfg(c)}}}catch(e){}_gh.saving=false;updSyncInd()}
async function ghSyncOnStart(){if(!_gh.ready)return;var cur=curPage;var remote=await ghLoad();if(remote){DB=remote;saveDB(DB);toast('云端已加载')}else if(DB.dailyReports.length){await ghSave();toast('已上传')}if(cur){curPage=cur;_curPage=cur;renderNav()}}
async function ghSetToken(t){t=t.trim();if(!t)return;_gh.token=t;_gh.ready=true;var c=ghGetCfg();c.token=t;ghSaveCfg(c);_gh.gistId=c.gistId||'';_gh.mediaGistId=c.mediaGistId||'';toast('连接中...');if(_gh.gistId){try{var r=await fetch('https://api.github.com/gists/'+_gh.gistId,{headers:{'Authorization':'token '+_gh.token}});if(r.ok){toast('已找到数据');await ghSyncOnStart();updSyncInd();rData();return}}catch(e){}}var ex=await ghFindGist();if(ex){_gh.gistId=ex.id;c=ghGetCfg();c.gistId=ex.id;ghSaveCfg(c);toast('找到已有数据');await ghSyncOnStart()}else{await ghSave();c=ghGetCfg();c.gistId=_gh.gistId;ghSaveCfg(c);toast('已连接')}updSyncInd();rData()}
function ghDisconnect(){if(!confirm('断开？'))return;localStorage.removeItem(GH_KEY);_gh={token:'',gistId:'',mediaGistId:'',ready:false,saving:false};updSyncInd();rData();toast('已断开')}
function updSyncInd(){var el=$id('syncInd');if(!el)return;el.innerHTML=_gh.ready?'<span class="sync-dot" style="background:var(--gn)"></span>已同步':'<span class="sync-dot" style="background:var(--tx-m)"></span>本地'}
var _ghTimer=null;function ghScheduleSave(){if(!_gh.ready)return;if(_ghTimer)clearTimeout(_ghTimer);_ghTimer=setTimeout(ghSave,1500)}

// ===== SEARCH =====
var _searchOpen=false,_searchTimer=null;
function toggleSearch(){_searchOpen=!_searchOpen;$id('searchBar').classList.toggle('show',_searchOpen);if(_searchOpen)$id('searchIn').focus();else $id('searchResults').innerHTML=''}
function scheduleSearch(){if(_searchTimer)clearTimeout(_searchTimer);_searchTimer=setTimeout(doSearch,180)}
function doSearch(){var q=($id('searchIn').value||'').trim().toLowerCase(),el=$id('searchResults');if(!q){el.innerHTML='';return}var h='',dr=[];DB.dailyReports.forEach(function(r){if(r.date.indexOf(q)>=0||(r.reporter||'').toLowerCase().indexOf(q)>=0)dr.push(r)});if(dr.length){h+='<div class="sec">日报 ('+dr.length+')</div>';dr.slice(0,8).forEach(function(r){h+='<div class="item-card" style="cursor:pointer" onclick="goPage(\'daily\')"><span class="name">'+r.date+'</span><div class="nums"><span>实收<b>'+fmtC(r.revenue.netSales)+'</b></span></div></div>'})}if(!h)h='<div style="text-align:center;padding:40px;color:var(--tx-m)">未找到</div>';el.innerHTML=h}

// ===== SYNC CODE =====
function genSyncCode(){DB._ts=Date.now();var t=btoa(unescape(encodeURIComponent(JSON.stringify(DB))));try{navigator.clipboard.writeText(t).then(function(){toast('已复制')}).catch(function(){prompt('同步码',t)})}catch(e){prompt('同步码',t)}}
function importSyncCode(){showModal('<h3>导入</h3><textarea id="impCodeIn" placeholder="粘贴同步码..."></textarea><div class="brow" style="margin-top:10px"><button class="btn p" onclick="doImportCode(document.getElementById(\'impCodeIn\').value)">导入</button><button class="btn" onclick="closeModal()">取消</button></div>')}
function doImportCode(c){if(!c)return;try{var d=JSON.parse(decodeURIComponent(escape(atob(c.trim()))));if(!d.dailyReports){toast('格式错误');return}DB=d;saveDB(DB);DB._ts=Date.now();ghScheduleSave();closeModal();toast('已同步');renderPage()}catch(e){toast('无效码')}}

// ===== DATABASE =====
var STORE='ax_cafe_v8';
var NAV=[{id:'dash',label:'总览',icon:'📊'},{id:'daily',label:'日报',icon:'📝'},{id:'purchase',label:'采购',icon:'🛒'},{id:'expense',label:'费用',icon:'💰'},{sep:true},{id:'tea',label:'茗茶',icon:'🍵'},{id:'cig',label:'香烟',icon:'🚬'},{id:'alc',label:'酒类',icon:'🍺'},{sep:true},{id:'wh',label:'仓库',icon:'📦'},{id:'damage',label:'报损',icon:'⚠️'},{sep:true},{id:'report',label:'报表',icon:'📈'},{id:'gen',label:'汇报',icon:'📄'},{sep:true},{id:'data',label:'设置',icon:'⚙️'},{id:'ai',label:'AI',icon:'🤖'}];
function initDB(){return{dailyReports:[],purchases:[],expenses:[],teaItems:[],cigItems:[],alcItems:[],areaCats: {},aiHistory:[],whItems:[],damageRecords:[]}}

// ========================================
// 初始化时给 DB 加上 areaCats 字段
// 在 initDB() 函数里加上这一行：
// areaCats: {}
// ========================================

// ========================================
// 首次加载时的迁移逻辑
// 从已有的采购记录中提取每个区域用过的分类
// 只在 DB.areaCats 为空时执行
// ========================================
function migrateAreaCats() {
    // 如果已有数据，跳过
    if (DB.areaCats && Object.keys(DB.areaCats).length > 0) return;

    // 初始化每个区域的分类列表
    DB.areaCats = {};

    // 遍历所有采购记录，按区域收集分类名
    DB.purchases.forEach(function(p) {
        p.items.forEach(function(item) {
            var area = item.section || '';   // 区域：厨房/吧台/外场
            var cat = item.category || '';    // 分类：调料/粮油 等
            if (area && cat) {
                // 如果这个区域还没有初始化，创建空数组
                if (!DB.areaCats[area]) DB.areaCats[area] = [];
                // 如果这个分类还不在列表里，加入
                if (DB.areaCats[area].indexOf(cat) < 0) {
                    DB.areaCats[area].push(cat);
                }
            }
        });
    });

    // 给空的区域填上默认分类
    var defaults = {
        "厨房": ["调料/粮油", "食材", "茶叶/干货"],
        "吧台": ["饮品", "耗材"],
        "外场": ["清洁", "包装", "设备"]
    };
    Object.keys(defaults).forEach(function(area) {
        if (!DB.areaCats[area] || !DB.areaCats[area].length) {
            DB.areaCats[area] = defaults[area];
        }
    });

    saveDB(DB);
}

// ========================================
// 获取分类列表
// 不传参数 → 返回所有区域的分类（去重）
// 传区域名 → 返回该区域的分类
// ========================================
function getPurCats(area) {
    // 如果 areaCats 还没初始化，给默认值
    if (!DB.areaCats) {
        DB.areaCats = {
            "厨房": ["调料/粮油", "食材", "茶叶/干货"],
            "吧台": ["饮品", "耗材"],
            "外场": ["清洁", "包装", "设备"]
        };
    }

    // 传了区域名，返回该区域的分类
    if (area && DB.areaCats[area]) {
        return DB.areaCats[area].slice();  // .slice() 返回副本，防止意外修改原数组
    }

    // 没传区域名，返回所有分类（合并去重）
    // 用于批量填充等不需要区分区域的场景
    var all = [];
    Object.keys(DB.areaCats).forEach(function(a) {
        DB.areaCats[a].forEach(function(c) {
            if (all.indexOf(c) < 0) all.push(c);
        });
    });
    return all.length ? all : ["调料/粮油", "食材", "茶叶/干货", "清洁", "耗材", "设备", "包装"];
}

// ========================================
// 工具：根据区域重建分类下拉框
// 当用户在某行选了区域后，那行的分类下拉要跟着变
// 参数：
//   selEl - 分类的 <select> 元素
//   area  - 区域名，如 "厨房"
// ========================================
function updateCatSelect(selEl, area) {
    // 获取该区域的分类列表
    var cats = getPurCats(area);

    // 重建下拉选项
    var html = '<option value="">-</option>';
    cats.forEach(function(c) {
        html += '<option>' + c + '</option>';
    });
    html += '<option value="__custom">自定义</option><option value="__clear">清除</option>';

    // innerHTML 替换掉原来的选项
    selEl.innerHTML = html;
}

// ========================================
// 工具：采购行的区域下拉变化时
// 1. 更新数据（_pmItems[idx].section）
// 2. 清空该行的分类（因为换区域了，旧分类不适用）
// 3. 重建该行的分类下拉
// 参数：
//   areaEl - 区域的 <select> 元素（this）
//   idx    - 这是第几行
// ========================================
function purAreaChanged(areaEl, idx) {
    var area = areaEl.value;      // 用户选的新区域
    _pmItems[idx].section = area; // 更新数据
    _pmItems[idx].category = '';  // 清空分类

    // 找到同一行里的分类下拉
    // closest('tr') 找最近的父级 <tr> 元素
    // querySelectorAll('select')[1] 找行内第2个select（第1个是区域）
    var row = areaEl.closest('tr');
    if (row) {
        var selects = row.querySelectorAll('select');
        if (selects[1]) {
            updateCatSelect(selects[1], area); // 重建分类下拉
        }
    }
}

function preprocessOCR(text){var lines=text.split('\n').map(function(l){return l.trim()}).filter(function(l){return l});var colKw=['序号','商品名称','品名','规格','订购数量','发货数量','单价','金额'];var hit=0;lines.forEach(function(l){colKw.forEach(function(k){if(l===k)hit++})});if(hit<3)return text;var sections={};var curK=null;lines.forEach(function(l){if(colKw.indexOf(l)>=0||/^(合计|总计|本页合计|备注|制单|送货|收供|财务|客户|收货|订单|配送)/.test(l)){curK=l;if(!sections[curK])sections[curK]=[]}else if(curK){sections[curK].push(l)}});var names=[];['商品名称','品名'].forEach(function(k){if(sections[k])sections[k].forEach(function(l){if(/[\u4e00-\u9fa5]/.test(l)&&l.length>=2&&!/^[\d.]+$/.test(l))names.push(l)})});var prices=[];if(sections['单价'])sections['单价'].forEach(function(l){if(/^\d+\.?\d*$/.test(l))prices.push(parseFloat(l))});var amounts=[];if(sections['金额'])sections['金额'].forEach(function(l){if(/^\d+\.?\d*$/.test(l))amounts.push(parseFloat(l))});var qtys=[];['发货数量','订购数量'].forEach(function(k){if(sections[k])sections[k].forEach(function(l){if(/^\d+[个条件箱包瓶袋盒把支]/.test(l))qtys.push(l)})});if(names.length&&amounts.length){var n=Math.min(names.length,amounts.length);if(qtys.length>n)qtys=qtys.slice(0,n);while(qtys.length<n)qtys.push('1个');if(prices.length>n)prices=prices.slice(0,n);var date='',source='岸香贸易';lines.forEach(function(l){var dm=l.match(/(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/);if(dm)date=dm[1]+'-'+String(dm[2]).padStart(2,'0')+'-'+String(dm[3]).padStart(2,'0');if(/贸易/.test(l)&&/岸香/.test(l))source='岸香贸易'});var out='';if(date)out+='#日期 '+date+'\n';out+='#来源 '+source+'\n';for(var i=0;i<n;i++){var p=prices.length>i?prices[i]:0;var a=amounts[i];if(p<=0&&a>0){var q=parseInt(qtys[i])||1;p=Math.round(a/q*100)/100}out+=names[i]+'\t'+qtys[i]+'\t'+p.toFixed(2)+'\t'+a.toFixed(2)+'\n'}return out}return text}

function preprocessVerticalTable(text) {
    // ===== 竖表转横表 =====
    // 原理：不依赖表头，通过内容特征识别各列
    // 1. 找商品名（含中文、非元数据、非规格）
    // 2. 找数量（数字+单位，如"10袋"）
    // 3. 找价格和金额（纯数字）
    // 4. 按位置配对

    if (!/出库单|送货单|入库单|验收单|采购单/.test(text)) return text;

    var lines = text.split('\n').map(function(l){return l.trim()}).filter(function(l){return l});

    // --- 元数据关键词：公司、地址、人员、编号等 ---
    var META = /安徽|岸香|贸易|公司|出库|送货|入库|客户|收货|收做|地址|合肥|停车场|大厦|弘皓|弘暗|弘結|制单|审核|财务|经手|订单|配送|合计|总计|页|薛|口路|编号|线路|第\d+|共\d+|^\d+-\d+$|^DD/;

    // --- 表头关键词：即使被OCR搞错（规棓、订购数盘），也能匹配首字 ---
    var HDR = /^(序号|除号|商品|品名|物料|货品|规|型号|订|发|入|单价|含税|金额|总价|数量|实际|申请|备注|说明)/;

    // --- 第1步：找商品名 ---
    var products = [], pLines = {};
    for (var i = 0; i < lines.length; i++) {
        var l = lines[i];
        if (l.length < 3 || l.length > 25) continue;     // 太短或太长都不是品名
        if (!/[\u4e00-\u9fa5]/.test(l)) continue;         // 必须含中文
        if (META.test(l)) continue;                        // 元数据跳过
        if (HDR.test(l)) continue;                         // 表头跳过
        if (/^\d+[\*×]\d+/.test(l)) continue;             // 规格如"1*10袋"
        if (/^\d+(?:\.\d+)?(?:kg|g|ml|KG|ML)\//i.test(l)) continue; // 规格如"1kg/袋"
        var cl = l.replace(/[\s,]/g,'').replace(/\.$/,'');
        if (/^\d+\.?\d*$/.test(cl)) continue;             // 纯数字跳过
        products.push({pos:i, name:l});
        pLines[i] = true;
    }

    var n = products.length;
    if (n < 3) return text;  // 不够3个商品，认为不是竖表

    // --- 第2步：找序号（商品附近的纯数字1-99）---
    var idxL = {};
    for (var i = 0; i < lines.length; i++) {
        if (!/^\d+$/.test(lines[i].trim())) continue;
        var num = parseInt(lines[i]);
        if (num < 1 || num > 99) continue;
        for (var j = 0; j < products.length; j++) {
            if (Math.abs(i - products[j].pos) <= 3) {  // 距商品3行以内
                idxL[i] = true;
                break;
            }
        }
    }

    // --- 第3步：收集数据 ---
    var qs = [], ns = [];  // qs=数量, ns=价格/金额
    for (var i = 0; i < lines.length; i++) {
        if (pLines[i] || idxL[i]) continue;  // 跳过商品名和序号
        var l = lines[i];
        if (META.test(l)) continue;          // 跳过元数据
        if (HDR.test(l)) continue;           // 跳过表头
        if (/^\d+[\*×]\d+/.test(l)) continue;
        if (/^\d+(?:\.\d+)?(?:kg|g|ml|KG|ML)\//i.test(l)) continue;

        // 数量：数字+单位
        if (/^\d+(?:\.\d+)?(袋|包|盒|罐|箱|件|听|瓶|斤)/.test(l)) {
            qs.push({r:l}); continue;
        }

        // 纯数字：价格或金额
        var cl = l.replace(/[\s,]/g,'').replace(/\.$/,'');
        if (/^\d+\.?\d*$/.test(cl) && parseFloat(cl) > 0) {
            ns.push({v:parseFloat(cl)});
        }
    }

    // --- 第4步：按位置配对 ---
    // 数量：预期2n个（订购+发货），取每对的第2个（发货）
    var qSet = [];
    if (qs.length >= n * 2 - 1 && qs.length <= n * 2 + 2) {
        for (var k = 0; k < n; k++) qSet.push(qs[k * 2 + 1]);
    } else { qSet = qs.slice(0, n); }

    // 数字：预期2n个（价格+金额），前半=价格，后半=金额
    var pSet = [], aSet = [];
    if (ns.length >= n * 2 - 1 && ns.length <= n * 2 + 2) {
        pSet = ns.slice(0, n);
        aSet = ns.slice(ns.length - n);
    } else if (ns.length >= n * 2) {
        pSet = ns.slice(0, n);
        aSet = ns.slice(n, n * 2);
    } else if (ns.length >= n) {
        aSet = ns.slice(0, n);
    }

    // --- 第5步：输出为tab分隔的行 ---
    var out = [];
    for (var r = 0; r < n; r++) {
        var row = [products[r].name];
        if (qSet[r]) row.push(qSet[r].r);
        if (pSet[r]) row.push(String(pSet[r].v));
        if (aSet[r]) row.push(String(aSet[r].v));
        out.push(row.join('\t'));
    }
    return out.join('\n');
}

function preprocessOCR(text) {
    try {
        // 1. 清洗OCR噪声字符
        text = text.replace(/[|｜]/g,'')     // 竖线
                    .replace(/\t/g,'  ')       // tab→双空格
                    .replace(/\r\n/g,'\n')     // 统一换行
                    .replace(/\u00a0/g,' ')    // 不间断空格
                    .replace(/[\u200B-\u200D\uFEFF]/g,'') // 零宽字符
                    .replace(/\s+$/gm,'');     // 行尾空白

        // 2. 竖表转横表
        text = preprocessVerticalTable(text);
    } catch(e) {
        console.error('OCR预处理出错:', e);
    }
    return text;
}

function parsePurchase(text) {
    // 1. 先从原文提取日期（避免被预处理破坏）
    var dm = text.match(/配送日期[：:]\s*(\d{4})[-\/.]\s*(\d{1,2})[-\/.]\s*(\d{1,2})/);
    if (!dm) dm = text.match(/(\d{4})[-\/.年]\s*(\d{1,2})[-\/.月]\s*(\d{1,2})/);

    // 2. 先从原文检测来源
    var isAx = /岸香.*贸易|贸易.*岸香/.test(text);

    // 3. OCR预处理（含竖表转横表）
    text = preprocessOCR(text);

    var r = {date:td(), items:[], source:'外购'};
    if (dm) r.date = dm[1] + '-' + String(dm[2]).padStart(2,'0') + '-' + String(dm[3]).padStart(2,'0');
    if (isAx) r.source = '岸香贸易';

    // 4. 辅助函数
    function pQU(cell) {
        var clean = cell.replace(/$$[^)]*$$/g,'').trim();
        var parts = clean.split(/[×*]/);
        var qm = parts[0].match(/([\d.]+)/);
        var q = 0, u = '';
        if (qm) { q = parseFloat(qm[1]); u = parts[0].replace(/[\d.]+/,'').trim(); }
        return {qty:q, unit:u};
    }
    function isPureUnit(t) {
        return /^[\u4e00-\u9fa5]{1,3}$/.test(t.trim()) && isNaN(parseFloat(t.trim()));
    }

    // 5. 逐行解析
    text.split('\n').forEach(function(raw) {
        var l = raw.trim();
        if (!l) return;
        l = l.replace(/\*\*/g,'');

        // 分隔符：tab或多个空格
        var cells;
        if (l.indexOf('\t') >= 0) {
            cells = l.split('\t').map(function(s){return s.trim()}).filter(function(s){return s});
        } else {
            cells = l.split(/\s{2,}/).filter(function(s){return s.trim()});
        }
        if (cells.length < 3) return;

        var name = cells[0].trim();
        if (!/[\u4e00-\u9fa5a-zA-Z]/.test(name)) return;

        var qty = 0, unit = '', total = 0, unitPrice = 0;

        if (cells.length >= 4) {
            // 品名 + 数量 + 单价 + 金额
            var qu = pQU(cells[1]);
            qty = qu.qty; unit = qu.unit;
            var upm = cells[2].match(/([\d.]+)/);
            unitPrice = upm ? parseFloat(upm[1]) : 0;
            total = parseFloat(cells[3].replace(/,/g,'').replace(/\.$/,'')) || 0;
        } else {
            // 品名 + 数量 + 金额
            var qu = pQU(cells[1]);
            qty = qu.qty; unit = qu.unit;
            total = parseFloat(cells[2].replace(/,/g,'').replace(/\.$/,'')) || 0;
        }

        if (!unitPrice && total > 0 && qty > 0) {
            unitPrice = Math.round(total / qty * 100) / 100;
        }

        if (qty > 0 && !isNaN(total)) {
            r.items.push({
                name: name, section:'', category:'',
                qty: qty, unit: unit,
                unitPrice: unitPrice, total: total,
                source: r.source
            });
        }
    });

    // 6. 数量校正（防止OCR数量错乱）
    r.items.forEach(function(item) {
        if (item.total > 0 && item.unitPrice > 0) {
            var eq = Math.round(item.total / item.unitPrice);
            if (eq > 0 && eq !== item.qty) item.qty = eq;
        }
    });

    return r;
}

// ========================================
// 简易Markdown转HTML
// AI返回的文本含有Markdown语法，需要转成HTML才能正确显示
// ========================================
function md2html(text){
    if(!text)return'';
    var html=text;
    // 标题：#### → <h4>，### → <h3>，## → <h2>，# → <h1>
    // 从长到短匹配，避免 #### 被 # 匹配4次
    html=html.replace(/^####\s+(.+)$/gm,'<h4 style="font-size:.84rem;font-weight:700;margin:12px 0 6px;color:var(--ac)">$1</h4>');
    html=html.replace(/^###\s+(.+)$/gm,'<h3 style="font-size:.88rem;font-weight:700;margin:14px 0 6px;color:var(--ac)">$1</h3>');
    html=html.replace(/^##\s+(.+)$/gm,'<h2 style="font-size:.92rem;font-weight:700;margin:16px 0 8px;color:var(--ac)">$1</h2>');
    html=html.replace(/^#\s+(.+)$/gm,'<h1 style="font-size:1rem;font-weight:700;margin:18px 0 10px;color:var(--ac)">$1</h1>');
    // 加粗：**文字** → <b>文字</b>
    html=html.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');
    // 斜体：*文字* → <i>文字</i>（避免匹配列表符号）
    html=html.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g,'<i>$1</i>');
    // 无序列表：- 开头的行
    html=html.replace(/^[-•]\s+(.+)$/gm,'<div style="padding-left:16px;margin:2px 0">• $1</div>');
    // 有序列表：1. 2. 3. 开头的行
    html=html.replace(/^(\d+)\.\s+(.+)$/gm,'<div style="padding-left:16px;margin:2px 0">$1. $2</div>');
    // 表格（简易）：| col | col | → HTML表格
    var lines=html.split('\n');
    var inTable=false,tableHtml='',tableLines=[];
    var result=[];
    lines.forEach(function(line){
        if(/^\|(.+)\|$/.test(line.trim())){
            if(!inTable){inTable=true;tableLines=[]}
            // 跳过分隔行 |---|---|
            if(/^\|[\s\-:|]+\|$/.test(line.trim()))return;
            var cells=line.trim().replace(/^\||\|$/g,'').split('|').map(function(c){return c.trim()});
            tableLines.push(cells);
        }else{
            if(inTable){
                result.push(buildTable(tableLines));
                inTable=false;tableLines=[];
            }
            result.push(line);
        }
    });
    if(inTable)result.push(buildTable(tableLines));
    return result.join('\n');
}

function buildTable(rows){
    if(!rows.length)return'';
    var h='<table class="pur-tbl" style="margin:8px 0">';
    rows.forEach(function(row,idx){
        h+='<tr>';
        row.forEach(function(cell){
            var tag=idx===0?'th':'td';
            h+='<'+tag+'>'+cell+'</'+tag+'>';
        });
        h+='</tr>';
    });
    h+='</table>';
    return h;
}

// ========================================
// MiMo 通用对话函数
// 所有AI功能都调用这个函数
// 参数：
//   prompt   - 发给AI的提示词
//   callback - 收到回答后的回调函数
//   opts     - 可选参数 {temperature, max_tokens}
// ========================================
function mimoChat(prompt,callback,opts){
    var ep=localStorage.getItem('ax_mimo_ep');
    var key=localStorage.getItem('ax_mimo_key');
    var model=localStorage.getItem('ax_mimo_model')||'mimo-v2.5';
    if(!ep||!key){toast('请先在设置页配置MiMo API');callback(null);return}
    var body={model:model,messages:[{role:'user',content:prompt}],max_tokens:(opts&&opts.max_tokens)||4096,temperature:(opts&&opts.temperature!==undefined)?opts.temperature:0.3};
    var h='<div style="text-align:center;padding:10px">';
    h+='<div style="font-size:.88rem;font-weight:700;margin-bottom:8px">确认发送到MiMo分析？</div>';
    h+='<div style="font-size:.72rem;color:var(--tx-m);margin-bottom:14px">模型: '+model+' · 将消耗Token</div>';
    h+='<div class="brow"><button class="btn p" onclick="doMimoRequest()">确认分析</button> <button class="btn" onclick="closeModal()">取消</button></div>';
    h+='</div>';
    showModal(h,400);
    window._pendingMimoBody=body;
    window._pendingMimoEp=ep;
    window._pendingMimoKey=key;
    window._pendingMimoCallback=callback;
}
function doMimoRequest(){
    closeModal();
    var body=window._pendingMimoBody;
    var ep=window._pendingMimoEp;
    var key=window._pendingMimoKey;
    var callback=window._pendingMimoCallback;
    if(!body||!callback)return;
    showAILoading();
    var xhr=new XMLHttpRequest();
    xhr.open('POST',ep,true);
    xhr.setRequestHeader('Content-Type','application/json');
    xhr.setRequestHeader('Authorization','Bearer '+key);
    xhr.timeout=120000;
    xhr.onload=function(){
        hideAILoading();
        console.log('MiMo返回:',xhr.status,xhr.responseText.substring(0,300));
        try{
            var data=JSON.parse(xhr.responseText);
            if(data.choices&&data.choices[0]){
                callback(data.choices[0].message.content||'');
            }else if(data.error){
                toast('API错误: '+(data.error.message||JSON.stringify(data.error)));
                callback(null);
            }else{callback(null)}
        }catch(e){toast('返回格式异常');callback(null)}
    };
    xhr.onerror=function(){hideAILoading();toast('请求失败，请检查网络');callback(null)};
    xhr.ontimeout=function(){hideAILoading();toast('请求超时');callback(null)};
    xhr.send(JSON.stringify(body));
}

// 辅助函数：构建本月数据摘要
// 把数据库中的关键数字提取出来，发给MiMo分析
// ========================================
function buildMonthSummary(ym) {
    var mr = getMR(ym);
    var mNet = mr.reduce(function(s, r) { return s + (r.revenue.netSales || 0); }, 0);
    var mKit = mr.reduce(function(s, r) { return s + (r.revenue.kitchenSales || 0); }, 0);
    var mBar = mr.reduce(function(s, r) { return s + (r.revenue.barSales || 0); }, 0);
    var mDel = mr.reduce(function(s, r) { return s + (r.delivery.total || 0); }, 0);
    var mGuests = mr.reduce(function(s, r) { return s + (r.guest.count || 0); }, 0);
    var days = mr.length;

    var mPur = DB.purchases.filter(function(p) { return p.date.startsWith(ym); })
        .reduce(function(s, p) { return s + p.items.reduce(function(ss, i) { return ss + i.total; }, 0); }, 0);
    var mExp = DB.expenses.filter(function(e) { return e.date.startsWith(ym); })
        .reduce(function(s, e) { return s + e.amount; }, 0);

    var lm = lastYM();
    var lmr = getMR(lm);
    var lNet = lmr.reduce(function(s, r) { return s + (r.revenue.netSales || 0); }, 0);

    // 每日明细
    var dailyLines = [];
    mr.sort(function(a, b) { return a.date.localeCompare(b.date); });
    mr.forEach(function(r) {
        dailyLines.push(
            r.date + ' 实收' + (r.revenue.netSales || 0) +
            ' 厨房' + (r.revenue.kitchenSales || 0) +
            ' 吧台' + (r.revenue.barSales || 0) +
            ' 客流' + (r.guest.count || 0) + '人'
        );
    });

    return [
        '月份: ' + ym,
        '经营天数: ' + days + '天',
        '实收总额: ' + mNet + '元',
        '厨房销售: ' + mKit + '元',
        '吧台销售: ' + mBar + '元',
        '外卖总额: ' + mDel + '元',
        '上月实收: ' + lNet + '元',
        '环比变化: ' + (lNet > 0 ? ((mNet - lNet) / lNet * 100).toFixed(1) : 0) + '%',
        '总客流: ' + mGuests + '人',
        '人均消费: ' + (mGuests > 0 ? (mNet / mGuests).toFixed(2) : 0) + '元',
        '采购总额: ' + mPur + '元',
        '费用总额: ' + mExp + '元',
        '净利润: ' + (mNet - mPur - mExp) + '元',
        '成本率: ' + (mNet > 0 ? (mPur / mNet * 100).toFixed(1) : 0) + '%',
        '',
        '每日明细:',
        dailyLines.join('\n')
    ].join('\n');
}

// ===== 解析AI返回的JSON =====
function parseMimoResult(reply) {
    if (!reply) return null;

    // 尝试提取JSON（AI可能在JSON前后加了```json等标记）
    var jsonStr = reply;

    // 去掉可能的markdown标记
    var m = reply.match(/\{[\s\S]*\}/);
    if (m) jsonStr = m[0];

    try {
        var data = JSON.parse(jsonStr);
        if (!data.items || !data.items.length) return null;

        var result = {
            date: data.date || td(),
            source: data.source || '外购',
            items: []
        };

        data.items.forEach(function(item) {
            var qty = parseFloat(item.qty) || 0;
            var total = parseFloat(item.total) || 0;
            var unitPrice = parseFloat(item.unitPrice) || 0;

            // 如果单价缺失，用金额÷数量计算
            if (!unitPrice && total > 0 && qty > 0) {
                unitPrice = Math.round(total / qty * 100) / 100;
            }

            if (qty > 0 && total > 0) {
                result.items.push({
                    name: item.name || '',
                    section: '',
                    category: '',
                    qty: qty,
                    unit: item.unit || '',
                    unitPrice: unitPrice,
                    total: total,
                    source: result.source
                });
            }
        });

        // 检测来源
        if (/岸香.*贸易|贸易.*岸香/.test(result.source)) {
            result.source = '岸香贸易';
        } else if (!result.source || result.source === '外购') {
            result.source = '外购';
        }

        return result.items.length > 0 ? result : null;
    } catch(e) {
        console.error('JSON解析失败:', e, reply);
        return null;
    }
}
function doMimoTextParse(){

function doMimoTextParseGo(){
    closeModal();
    showAILoading();
    var body=window._pendingMimoBody;
    var ep=window._pendingMimoEp;
    var key=window._pendingMimoKey;
    var xhr=new XMLHttpRequest();
    xhr.open('POST',ep,true);
    xhr.setRequestHeader('Content-Type','application/json');
    xhr.setRequestHeader('Authorization','Bearer '+key);
    xhr.timeout=120000;
    xhr.onload=function(){
        hideAILoading();
        console.log('MiMo返回:',xhr.status,xhr.responseText.substring(0,300));
        try{
            var data=JSON.parse(xhr.responseText);
            var reply='';
            if(data.choices&&data.choices[0])reply=data.choices[0].message.content||'';
            if(!reply){toast('AI返回为空');return}
            var m=reply.match(/\{[\s\S]*\}/);
            if(!m){toast('AI未返回JSON格式');return}
            var result=JSON.parse(m[0]);
            if(!result.items||!result.items.length){toast('未识别到商品');return}
            if(!result.date)result.date=td();
            var src=result.source||'';
            if(/岸香.*贸易|贸易.*岸香/.test(src))src='岸香贸易';
            else if(!src)src='外购';
            var items=[];
            result.items.forEach(function(item){
                var qty=parseFloat(item.qty)||0,total=parseFloat(item.total)||0,unitPrice=parseFloat(item.unitPrice)||0;
                if(!unitPrice&&total>0&&qty>0)unitPrice=Math.round(total/qty*100)/100;
                if(qty>0&&total>0)items.push({name:item.name||'',section:'',category:'',qty:qty,unit:item.unit||'',unitPrice:unitPrice,total:total,source:src});
            });
            if(!items.length){toast('解析结果为空');return}
            window._mimoResult={date:result.date,source:src,items:items};
            showMimoConfirm();
        }catch(e){toast('解析失败');console.error(e)}
    };
    xhr.onerror=function(){hideAILoading();toast('请求失败');};
    xhr.ontimeout=function(){hideAILoading();toast('请求超时');};
    xhr.send(JSON.stringify(body));
}

function doAIParse(){
    if(!localStorage.getItem('ax_mimo_key')){toast('请先在设置页配置MiMo API');return}
    var input=document.createElement('input');
    input.type='file';
    input.accept='image/*';
    input.capture='environment';
    input.onchange=function(e){
        var file=e.target.files[0];
        if(!file)return;
        var reader=new FileReader();
        reader.onload=function(ev){
            var img=new Image();
            img.onload=function(){
                var canvas=document.createElement('canvas');
                var maxW=1600;
                var w=img.width,h=img.height;
                if(w>maxW){h=h*maxW/w;w=maxW}
                canvas.width=w;canvas.height=h;
                canvas.getContext('2d').drawImage(img,0,0,w,h);
                var base64=canvas.toDataURL('image/jpeg',0.85).split(',')[1];
                var prompt='请识别这张采购单/出库单图片，提取所有商品信息。\n请严格按以下JSON格式返回，不要有任何其他文字：\n\n{\n  "date": "YYYY-MM-DD",\n  "source": "供应商名称",\n  "items": [\n    {"name": "商品名称", "qty": 数字, "unit": "单位", "unitPrice": 单价, "total": 金额}\n  ]\n}\n\n注意：qty是发货数量，只返回JSON。';
                var body={model:localStorage.getItem('ax_mimo_model')||'mimo-v2.5',messages:[{role:'user',content:[{type:'text',text:prompt},{type:'image_url',image_url:{url:'data:image/jpeg;base64,'+base64}}]}],max_tokens:4096,temperature:0.1};
                var ep=localStorage.getItem('ax_mimo_ep');
                var key=localStorage.getItem('ax_mimo_key');
                var h='<div style="text-align:center;padding:10px">';
                h+='<div style="font-size:.88rem;font-weight:700;margin-bottom:8px">确认识别这张图片？</div>';
                h+='<div style="font-size:.72rem;color:var(--tx-m);margin-bottom:14px">将消耗Token</div>';
                h+='<div class="brow"><button class="btn p" onclick="doAIParseGo()">确认识别</button> <button class="btn" onclick="closeModal()">取消</button></div>';
                h+='</div>';
                showModal(h,400);
                window._pendingMimoBody=body;
                window._pendingMimoEp=ep;
                window._pendingMimoKey=key;
            };
            img.src=ev.target.result;
        };
        reader.readAsDataURL(file);
    };
    input.click();
}

// ========================================
// 渲染当前选中区域的分类列表
// ========================================
function renderAreaCatsList() {
    var area = document.getElementById('macArea').value;
    var cats = DB.areaCats[area] || [];

    var h = '';

    if (!cats.length) {
        h += '<div style="text-align:center;padding:20px;color:var(--tx-m)">该区域暂无分类</div>';
    } else {
        h += '<div class="tw"><table><tr><th>分类名称</th><th>使用次数</th><th>操作</th></tr>';

        cats.forEach(function(cat) {
            // 统计这个分类在该区域下被使用了多少次
            var count = 0;
            DB.purchases.forEach(function(p) {
                p.items.forEach(function(i) {
                    if ((i.section || '') === area && i.category === cat) count++;
                });
            });

            h += '<tr>';
            h += '<td>' + cat + '</td>';
            h += '<td class="nr">' + count + '</td>';
            h += '<td><button class="btn s d" onclick="delAreaCat(' + sq(cat) + ')">删除</button></td>';
            h += '</tr>';
        });

        h += '</table></div>';
    }

    document.getElementById('macList').innerHTML = h;
}

// ========================================
// 给当前区域添加一个新分类
// ========================================
function addAreaCat() {
    var area = document.getElementById('macArea').value;
    var name = document.getElementById('newAreaCat').value.trim();
    if (!name) { toast('输入分类名称'); return; }

    // 初始化该区域的数组（如果还没有）
    if (!DB.areaCats[area]) DB.areaCats[area] = [];

    // 检查是否已存在
    if (DB.areaCats[area].indexOf(name) >= 0) { toast('该区域已有此分类'); return; }

    // 加入数组并保存
    DB.areaCats[area].push(name);
    saveDB(DB);
    ghScheduleSave();

    // 清空输入框，刷新列表
    document.getElementById('newAreaCat').value = '';
    toast('已添加 ' + name);
    renderAreaCatsList();
}

// ========================================
// 删除当前区域的一个分类
// 彻底删除：从分类列表和已有的采购记录中都清除
// ========================================
function delAreaCat(name) {
    var area = document.getElementById('macArea').value;
    if (!confirm('彻底删除"' + area + '"下的"' + name + '"？\n已使用该分类的采购记录中的分类会被清空')) return;

    // 从分类列表中移除
    DB.areaCats[area] = (DB.areaCats[area] || []).filter(function(c) {
        return c !== name;
    });

    // 从已有采购记录中清空该分类
    DB.purchases.forEach(function(p) {
        p.items.forEach(function(i) {
            if ((i.section || '') === area && i.category === name) {
                i.category = '';
            }
        });
    });

    saveDB(DB);
    ghScheduleSave();
    toast('已删除');
    renderAreaCatsList();
}

// ========================================
function renderPHist() {

    // ===== 第1步：获取元素和月份 =====
    // el 是显示内容的目标区域
    var el = document.getElementById('pHistArea');
    if (!el) return;

    // ym = 当前选中的月份，格式如 "2026-05"
    var ym = document.getElementById('pHistM')
        ? document.getElementById('pHistM').value
        : curYM();  // curYM() 返回当前年月
    if (!ym) ym = curYM();

    // ===== 第2步：筛选本月采购数据 =====
    // 从 DB.purchases 中找出日期以 ym 开头的记录
    // 例如 ym="2026-05"，则匹配 "2026-05-01", "2026-05-12" 等
    // .sort() 按日期升序排列（早的在前）
    var pur = DB.purchases.filter(function(p) {
        return p.date.startsWith(ym);
    }).sort(function(a, b) {
        return a.date.localeCompare(b.date);
    });

    // 如果本月没有采购记录，显示提示
    if (!pur.length) {
        el.innerHTML = '<div style="text-align:center;padding:30px;color:var(--tx-m)">本月暂无记录</div>';
        return;
    }

    // ===== 第3步：按来源统计各区域金额 =====
    // srcAreaTotals 的结构：
    // {
    //   "岸香贸易": { total: 10500, "厨房": 6200, "吧台": 3100, "外场": 1200 },
    //   "外购":     { total: 1845,  "厨房": 1200, "吧台": 445,  "外场": 200 }
    // }
    var grandTotal = 0;     // 所有来源的总金额
    var dayData = {};        // 按日期分组的数据，用于日历
    var srcAreaTotals = {};  // 按来源分组的区域统计

    pur.forEach(function(p) {
        // 初始化这个日期的数据容器
        if (!dayData[p.date]) dayData[p.date] = {};

        // 遍历这张采购单的每个物品
        p.items.forEach(function(item) {
            var src = item.source || p.source || '外购';    // 来源
            var area = item.section || '其他';               // 区域（厨房/吧台/外场）
            var cat = item.category || '未分类';             // 分类

            // 初始化嵌套结构
            if (!dayData[p.date][src]) dayData[p.date][src] = {};
            if (!dayData[p.date][src][area]) dayData[p.date][src][area] = {};
            if (!dayData[p.date][src][area][cat]) dayData[p.date][src][area][cat] = [];

            // 把物品放进对应的 日期 > 来源 > 区域 > 分类 下
            dayData[p.date][src][area][cat].push(item);

            // 累加总金额
            grandTotal += item.total;

            // 累加来源-区域统计
            if (!srcAreaTotals[src]) srcAreaTotals[src] = { total: 0 };
            srcAreaTotals[src].total += item.total;
            if (!srcAreaTotals[src][area]) srcAreaTotals[src][area] = 0;
            srcAreaTotals[src][area] += item.total;
        });
    });

    // ===== 第4步：构建 HTML =====
    var h = '';

    // --- 4a. 顶部统计卡片 ---
    // 4张卡片：采购合计、采购天数、岸香贸易、外购
    // 如果有多个来源会自动显示
    var dates = Object.keys(dayData).sort();
    h += '<div class="cards">';
    h += '<div class="card"><div class="card-l">本月采购合计</div>';
    h += '<div class="card-v ac">' + fmtC(grandTotal) + '</div></div>';
    h += '<div class="card"><div class="card-l">采购天数</div>';
    h += '<div class="card-v">' + dates.length + '</div></div>';
    h += '</div>';

    // --- 4b. 来源分区域统计卡片 ---
    // 按固定顺序排列来源：岸香贸易 > 外购 > 其他
    var srcOrder = [];
    if (srcAreaTotals['岸香贸易']) srcOrder.push('岸香贸易');
    if (srcAreaTotals['外购']) srcOrder.push('外购');
    // 把不在预设里的来源追加到后面
    Object.keys(srcAreaTotals).forEach(function(s) {
        if (srcOrder.indexOf(s) < 0) srcOrder.push(s);
    });

    var allAreas = ['厨房', '吧台', '外场', '其他'];

    srcOrder.forEach(function(src) {
        var sd = srcAreaTotals[src];  // 这个来源的统计数据
        h += '<div style="background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:14px">';
        // 来源名称 + 总金额
        h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
        h += '<span style="font-size:.84rem;font-weight:700;color:var(--ac)">' + src + '</span>';
        h += '<span style="font-family:var(--fm);font-size:.88rem;font-weight:600">' + fmtC(sd.total) + '</span>';
        h += '</div>';
        // 各区域小卡片（网格布局）
        h += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px">';
        allAreas.forEach(function(area) {
            var v = sd[area] || 0;
            if (v > 0 || sd.total > 0) {
                h += '<div style="background:var(--card-h);border:1px solid var(--bd-l);border-radius:6px;padding:8px;text-align:center">';
                h += '<div style="font-size:.65rem;color:var(--tx-m);margin-bottom:3px">' + area + '</div>';
                h += '<div style="font-family:var(--fm);font-size:.82rem;font-weight:600;color:' + (v > 0 ? 'var(--tx)' : 'var(--tx-m)') + '">' + fmtC(v) + '</div>';
                h += '</div>';
            }
        });
        h += '</div></div>';
    });

    // ===== 第5步：日历视图 =====
    // 解析年月，计算这个月有多少天、第一天是周几
    var year = parseInt(ym.split('-')[0]);
    var month = parseInt(ym.split('-')[1]);
    var daysInMonth = new Date(year, month, 0).getDate();  // 这个月的天数
    var firstDay = new Date(year, month - 1, 1).getDay();   // 第一天是周几（0=周日）
    firstDay = firstDay === 0 ? 6 : firstDay - 1;           // 转成 周一=0 周日=6

    // 计算每天的采购总金额（用于日历上显示）
    var dayTotals = {};
    dates.forEach(function(date) {
        var d = parseInt(date.split('-')[2]);  // 取日期的"日"部分
        var t = 0;
        Object.keys(dayData[date]).forEach(function(src) {
            Object.keys(dayData[date][src]).forEach(function(area) {
                Object.keys(dayData[date][src][area]).forEach(function(cat) {
                    dayData[date][src][area][cat].forEach(function(it) {
                        t += it.total;
                    });
                });
            });
        });
        dayTotals[d] = t;
    });

    // 今天的日期（用于高亮）
    var todayStr = td();
    var todayDay = parseInt(todayStr.split('-')[2]);
    var isThisMonth = todayStr.startsWith(ym);

    // 渲染日历
    h += '<div style="margin-top:14px;margin-bottom:14px">';
    h += '<div style="font-size:.84rem;font-weight:700;color:var(--ac);margin-bottom:10px">采购日历</div>';

    // 星期标题行
    h += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">';
    var weekDays = ['一', '二', '三', '四', '五', '六', '日'];
    weekDays.forEach(function(w) {
        h += '<div style="text-align:center;font-size:.7rem;color:var(--tx-m);padding:4px 0">' + w + '</div>';
    });

    // 前面的空白格（月初不是周一时需要补位）
    for (var i = 0; i < firstDay; i++) {
        h += '<div></div>';
    }

    // 每一天的格子
    for (var d = 1; d <= daysInMonth; d++) {
        var hasPur = !!dayTotals[d];           // 这天有没有采购
        var isToday = isThisMonth && d === todayDay;  // 是不是今天
        var dateStr = ym + '-' + String(d).padStart(2, '0');  // 完整日期字符串

        // 格子样式
        var bg = hasPur ? 'var(--card)' : 'var(--card-h)';
        var border = isToday ? '2px solid var(--ac)' : '1px solid var(--bd)';
        var cursor = hasPur ? 'pointer' : 'default';

        h += '<div style="background:' + bg + ';border:' + border + ';border-radius:6px;padding:5px 4px;min-height:52px;cursor:' + cursor + '"';

        // 如果有采购，点击展开当天明细
        if (hasPur) {
            h += ' onclick="showPurDay(' + "'" + dateStr + "'" + ')"';
        }
        h += '>';

        // 日期数字
        h += '<div style="font-size:.7rem;font-weight:600;color:' + (isToday ? 'var(--ac)' : 'var(--tx)') + '">' + d + '</div>';

        // 如果有采购，显示金额
        if (hasPur) {
            h += '<div style="font-family:var(--fm);font-size:.65rem;color:var(--ac);margin-top:2px">';
            // 如果金额超过1万，简写
            if (dayTotals[d] >= 10000) {
                h += (dayTotals[d] / 10000).toFixed(1) + '万';
            } else if (dayTotals[d] >= 1000) {
                h += (dayTotals[d] / 1000).toFixed(1) + 'k';
            } else {
                h += '¥' + dayTotals[d].toFixed(0);
            }
            h += '</div>';
        }

        h += '</div>';
    }

    h += '</div></div>';

    // 输出到页面
    el.innerHTML = h;
}

// ========================================
// 采购明细弹窗
// 点击日历上的日期时调用
// 显示：来源 > 区域 > 分类 > 物品，全部展开
// 每级都有删除按钮，每个物品有编辑/删除
// ========================================
function showPurDay(date) {

    // --- 第1步：获取这天的所有采购单 ---
    // filter 只保留日期匹配的
    var dayPur = DB.purchases.filter(function(p) {
        return p.date === date;
    });
    if (!dayPur.length) { toast('暂无数据'); return; }

    // --- 第2步：按 来源 > 区域 > 分类 分组 ---
    // dayData 的结构：
    // {
    //   "岸香贸易": {
    //     "厨房": {
    //       "调料/粮油": [物品1, 物品2, ...],
    //       "食材":     [物品3, ...]
    //     },
    //     "吧台": { ... }
    //   },
    //   "外购": { ... }
    // }
    var dayData = {};
    var dayTotal = 0;

    dayPur.forEach(function(p) {
        p.items.forEach(function(item) {
            // 确定每个物品归属的 来源/区域/分类
            var src  = item.source  || p.source   || '外购';
            var area = item.section || '其他';
            var cat  = item.category || '未分类';

            // 逐层初始化嵌套对象（如果还没有的话）
            if (!dayData[src])              dayData[src] = {};
            if (!dayData[src][area])        dayData[src][area] = {};
            if (!dayData[src][area][cat])   dayData[src][area][cat] = [];

            // 把物品放进对应的分类里
            dayData[src][area][cat].push(item);
            // 累加总金额
            dayTotal += item.total;
        });
    });

    // --- 第3步：构建弹窗 HTML ---
    var h = '';

    // 标题栏：日期 + 总金额
    h += '<h3 style="display:flex;justify-content:space-between;align-items:center">';
    h += '<span>' + date + '</span>';
    h += '<span style="font-family:var(--fm);color:var(--ac)">' + fmtC(dayTotal) + '</span>';
    h += '</h3>';

    // 删除当日按钮
    h += '<div style="margin-bottom:12px">';
    h += '<button class="btn s d" onclick="purDayDel(' + sq(date) + ')">删除当日</button>';
    h += '</div>';

    // 可滚动的内容区（内容多时不超出屏幕）
    h += '<div style="max-height:55vh;overflow-y:auto;padding-right:4px">';

    // --- 第4步：遍历 来源 > 区域 > 分类 > 物品 ---
    // Object.keys() 返回对象的所有键名，组成数组
    // 例：Object.keys({a:1, b:2}) → ["a", "b"]

    var sources = Object.keys(dayData); // 所有来源
    sources.forEach(function(src) {
        // 计算这个来源的总金额
        var srcTotal = 0;
        Object.keys(dayData[src]).forEach(function(a) {
            Object.keys(dayData[src][a]).forEach(function(c) {
                dayData[src][a][c].forEach(function(it) {
                    srcTotal += it.total;
                });
            });
        });

        // 来源卡片
        h += '<div style="background:var(--card-h);border:1px solid var(--bd);border-radius:var(--r);padding:12px;margin-bottom:10px">';

        // 来源标题：名称 + 金额 + 删除按钮
        h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
        h += '<span style="font-weight:700;color:var(--ac);font-size:.84rem">' + src + '</span>';
        h += '<span><span style="font-family:var(--fm);font-size:.82rem">' + fmtC(srcTotal) + '</span>';
        h += ' <button class="btn s d" onclick="purDaySrcDel(' + sq(date) + ',' + sq(src) + ')">删除</button></span>';
        h += '</div>';

        // 遍历区域
        var areas = Object.keys(dayData[src]);
        areas.forEach(function(area) {
            // 计算区域总金额
            var areaTotal = 0;
            Object.keys(dayData[src][area]).forEach(function(c) {
                dayData[src][area][c].forEach(function(it) {
                    areaTotal += it.total;
                });
            });

            h += '<div style="margin-bottom:8px">';

            // 区域标题：名称 + 金额 + 删除按钮
            h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">';
            h += '<span style="font-weight:600;font-size:.78rem">' + area + '</span>';
            h += '<span><span style="font-family:var(--fm);font-size:.76rem">' + fmtC(areaTotal) + '</span>';
            h += ' <button class="btn s d" onclick="purAreaDel(' + sq(date) + ',' + sq(area) + ')">删除</button></span>';
            h += '</div>';

            // 遍历分类
            var cats = Object.keys(dayData[src][area]);
            cats.forEach(function(cat) {
                var catItems = dayData[src][area][cat];
                // reduce 把数组所有元素的 total 加起来
                var catTotal = catItems.reduce(function(s, i) {
                    return s + i.total;
                }, 0); // 0 是初始值

                h += '<div style="margin-bottom:6px">';

                // 分类标题
                h += '<div style="font-size:.72rem;color:var(--tx-s);margin-bottom:3px">';
                h += cat + ' <span style="font-family:var(--fm)">' + fmtC(catTotal) + '</span>';
                h += '</div>';

                // 物品表格
                h += '<table class="pur-tbl">';
                h += '<tr><th>品名</th><th>数量</th><th>单价</th><th>总价</th><th>涨跌</th><th>操作</th></tr>';

                catItems.forEach(function(item) {
                    // 获取单价
                    var up = getItemUp(item);

                    // 计算涨跌：跟上次采购同名物品的单价比较
                    var prev = findPrevPrice(item.name, date);
                    var change = '';
                    if (up > 0 && prev && prev.unitPrice > 0) {
                        // 百分比变化 = (现在-上次) / 上次 × 100
                        var pct = (up - prev.unitPrice) / prev.unitPrice * 100;
                        if (Math.abs(pct) >= 0.5) {
                            // 变化超过0.5%才显示
                            var arrow = pct > 0 ? '↑' : '↓';
                            var color = pct > 0 ? 'var(--rd)' : 'var(--gn)';
                            change = '<span style="color:' + color + ';font-family:var(--fm);font-size:.72rem">'
                                + arrow + Math.abs(pct).toFixed(1) + '%</span>';
                        } else {
                            change = '<span style="color:var(--tx-m);font-size:.72rem">持平</span>';
                        }
                    }

                    h += '<tr>';
                    h += '<td>' + item.name + '</td>';
                    h += '<td class="nr">' + item.qty + (item.unit || '') + '</td>';
                    h += '<td class="nr">' + (up > 0 ? fmtC(up) : '-') + '</td>';
                    h += '<td class="nr">' + fmtC(item.total) + '</td>';
                    h += '<td style="text-align:left;min-width:80px">' + change + '</td>';
                    // 编辑按钮：调用已有的编辑函数（会弹出编辑弹窗覆盖当前弹窗）
                    h += '<td><button class="btn s" onclick="editPurByDate(' + sq(date) + ',' + sq(item.name) + ')">编</button> ';
                    // 删除按钮：删除后重新打开弹窗
                    h += '<button class="btn s d" onclick="delPurItemAndRefresh(' + sq(date) + ',' + sq(item.name) + ')">×</button></td>';
                    h += '</tr>';
                });

                // 分类合计行
                h += '<tr style="background:var(--card-h)">';
                h += '<td colspan="3" style="text-align:right;font-weight:600;font-size:.72rem">分类合计</td>';
                h += '<td class="nr" style="font-weight:600">' + fmtC(catTotal) + '</td>';
                h += '<td colspan="2"></td></tr>';

                h += '</table>';
                h += '</div>'; // 关闭分类
            });

            h += '</div>'; // 关闭区域
        });

        h += '</div>'; // 关闭来源
    });

    h += '</div>'; // 关闭滚动区

    // 关闭按钮
    h += '<div class="brow" style="margin-top:12px">';
    h += '<button class="btn" onclick="closeModal()">关闭</button>';
    h += '</div>';

    // 显示弹窗
    showModal(h,700);
}

// ========================================
// 删除某天全部采购
// 关闭弹窗 → 刷新日历
// ========================================
function purDayDel(date) {
    if (!confirm('删除 ' + date + ' 全部采购？')) return;
    upd(function(db) {
        // filter 保留日期不匹配的（即删除匹配的）
        db.purchases = db.purchases.filter(function(p) {
            return p.date !== date;
        });
    });
    toast('已删除');
    closeModal();     // 关闭弹窗
    renderPHist();    // 刷新日历
}

// ========================================
// 删除某天某来源的全部物品
// 刷新弹窗（重新调用 showPurDay）
// ========================================
function purDaySrcDel(date, src) {
    if (!confirm('删除 ' + date + ' ' + src + ' 全部？')) return;
    upd(function(db) {
        // 遍历这天的采购单，过滤掉属于该来源的物品
        db.purchases.forEach(function(p) {
            if (p.date === date) {
                p.items = p.items.filter(function(i) {
                    return (i.source || p.source) !== src;
                });
            }
        });
        // 清理空采购单（items为空的删除）
        db.purchases = db.purchases.filter(function(p) {
            return p.items.length > 0;
        });
    });
    toast('已删除');
    // 重新打开弹窗（如果这天还有数据的话）
    var remaining = DB.purchases.filter(function(p) { return p.date === date; });
    if (remaining.length) showPurDay(date);
    else { closeModal(); renderPHist(); }
}

// ========================================
// 删除某天某区域的全部物品
// ========================================
function purAreaDel(date, area) {
    if (!confirm('删除 ' + date + ' ' + area + ' 全部？')) return;
    upd(function(db) {
        db.purchases.forEach(function(p) {
            if (p.date === date) {
                p.items = p.items.filter(function(i) {
                    return (i.section || '其他') !== area;
                });
            }
        });
        db.purchases = db.purchases.filter(function(p) {
            return p.items.length > 0;
        });
    });
    toast('已删除');
    var remaining = DB.purchases.filter(function(p) { return p.date === date; });
    if (remaining.length) showPurDay(date);
    else { closeModal(); renderPHist(); }
}

// ========================================
// 删除单个物品并刷新弹窗
// ========================================
function delPurItemAndRefresh(date, name) {
    if (!confirm('删除 ' + name + '？')) return;
    upd(function(db) {
        db.purchases.forEach(function(p) {
            if (p.date === date) {
                p.items = p.items.filter(function(i) {
                    return i.name !== name;
                });
            }
        });
        db.purchases = db.purchases.filter(function(p) {
            return p.items.length > 0;
        });
    });
    toast('已删除');
    var remaining = DB.purchases.filter(function(p) { return p.date === date; });
    if (remaining.length) showPurDay(date);
    else { closeModal(); renderPHist(); }
}

// ========================================
// 日报明细弹窗
// 点击日报日历上的日期时调用
// 所有字段可编辑，保存后更新数据库
// ========================================
function showDailyModal(date) {
    // 查找这天的日报
    var r = DB.dailyReports.find(function(d) { return d.date === date; });
    if (!r) { toast('未找到日报'); return; }

    var h = '<h3>' + date + ' 日报</h3>';

    // 可滚动内容区
    h += '<div style="max-height:60vh;overflow-y:auto;padding-right:4px">';

    // --- 营收 ---
    h += '<div class="section-label">营收</div>';
    h += '<div class="hrow"><label>流水</label><input class="inp" id="dm_gross" type="number" step="0.01" value="' + (r.revenue.grossSales||0) + '"></div>';
    h += '<div class="hrow"><label>折扣</label><input class="inp" id="dm_discount" type="number" step="0.01" value="' + (r.revenue.discount||0) + '">';
    h += '<label>实收</label><input class="inp" id="dm_net" type="number" step="0.01" value="' + (r.revenue.netSales||0) + '"></div>';
    h += '<div class="hrow"><label>厨房</label><input class="inp" id="dm_kitchen" type="number" step="0.01" value="' + (r.revenue.kitchenSales||0) + '">';
    h += '<label>吧台</label><input class="inp" id="dm_bar" type="number" step="0.01" value="' + (r.revenue.barSales||0) + '"></div>';

// ========================================
// 保存日报（从弹窗中的输入框读取数据）
// ========================================
function saveDailyModal(date) {
    upd(function(db) {
        var r = db.dailyReports.find(function(d) { return d.date === date; });
        if (!r) return;

        // parseFloat 读取小数，|| 0 防止 NaN
        // parseInt 读取整数
        // getElementById 通过 id 获取输入框元素
        // .value 读取输入框的值

        // 营收
        r.revenue.grossSales  = parseFloat(document.getElementById('dm_gross').value) || 0;
        r.revenue.discount    = parseFloat(document.getElementById('dm_discount').value) || 0;
        r.revenue.netSales    = parseFloat(document.getElementById('dm_net').value) || 0;
        r.revenue.kitchenSales= parseFloat(document.getElementById('dm_kitchen').value) || 0;
        r.revenue.barSales    = parseFloat(document.getElementById('dm_bar').value) || 0;
        r.revenue.cigarette.total = parseFloat(document.getElementById('dm_cig').value) || 0;
        r.revenue.other       = parseFloat(document.getElementById('dm_other').value) || 0;

        // 支付
        r.payment.pos         = parseFloat(document.getElementById('dm_pos').value) || 0;
        r.payment.ccbLife     = parseFloat(document.getElementById('dm_ccb').value) || 0;
        r.payment.cash        = parseFloat(document.getElementById('dm_cash').value) || 0;
        r.payment.memberCard  = parseFloat(document.getElementById('dm_member').value) || 0;
        r.payment.treat       = parseFloat(document.getElementById('dm_treat').value) || 0;

        // 应收（自动求和）
        r.payment.ar.meituan  = parseFloat(document.getElementById('dm_meituan').value) || 0;
        r.payment.ar.douyin   = parseFloat(document.getElementById('dm_douyin').value) || 0;
        r.payment.ar.total    = r.payment.ar.meituan + r.payment.ar.douyin;

        // 外卖（自动求和）
        r.delivery.meituan    = parseFloat(document.getElementById('dm_d_meituan').value) || 0;
        r.delivery.taobao     = parseFloat(document.getElementById('dm_d_taobao').value) || 0;
        r.delivery.jd         = parseFloat(document.getElementById('dm_d_jd').value) || 0;
        r.delivery.total      = r.delivery.meituan + r.delivery.taobao + r.delivery.jd;

        // 客情
        r.guest.count         = parseInt(document.getElementById('dm_count').value) || 0;
        r.guest.avgSpend      = parseFloat(document.getElementById('dm_avg').value) || 0;
        r.guest.premiumRoomsToday = parseInt(document.getElementById('dm_premium').value) || 0;

        // 汇报人
        r.reporter = document.getElementById('dm_reporter').value.trim();
    });

    toast('已保存');
    closeModal();     // 关闭弹窗
    renderDHist();    // 刷新日历
}

// ========================================
// 删除日报（从弹窗中调用）
// ========================================
function delDailyFromModal(date) {
    if (!confirm('删除 ' + date + ' 的日报？')) return;
    upd(function(db) {
        db.dailyReports = db.dailyReports.filter(function(d) {
            return d.date !== date;
        });
    });
    toast('已删除');
    closeModal();
    renderDHist();
}

// 删除某天全部采购
function delPurDay(date) {
    if (!confirm('删除 ' + date + ' 全部采购？')) return;
    upd(function(db) {
        db.purchases = db.purchases.filter(function(p) { return p.date !== date; });
    });
    toast('已删除');
    renderPHist();
}

// 删除某天某来源全部采购
function delPurDaySrc(date, src) {
    if (!confirm('删除 ' + date + ' ' + src + ' 全部？')) return;
    upd(function(db) {
        db.purchases.forEach(function(p) {
            if (p.date === date) {
                p.items = p.items.filter(function(i) { return (i.source || p.source) !== src; });
            }
        });
        db.purchases = db.purchases.filter(function(p) { return p.items.length > 0; });
    });
    toast('已删除');
    showPurDay(date);
}

function calcMvTeaAmt(){var itemId=document.getElementById('mvItem').value;var item=DB.teaItems.find(function(i){return i.id===itemId});if(!item)return;var cups=parseInt(document.getElementById('mvCups').value)||0;var pots=parseInt(document.getElementById('mvPots').value)||0;var expected=cups*(item.pricePerCup||0)+pots*(item.pricePerPot||0);document.getElementById('mvExpected').value=expected.toFixed(2)}
function calcMvCigAmt(){var itemId=document.getElementById('mvItem').value;var item=DB.cigItems.find(function(i){return i.id===itemId});if(!item)return;var qty=parseInt(document.getElementById('mvQty').value)||0;document.getElementById('mvAmount').value=(qty*(item.pricePerUnit||0)).toFixed(2)}
function calcMvAlcAmt(){var itemId=document.getElementById('mvItem').value;var item=DB.alcItems.find(function(i){return i.id===itemId});if(!item)return;var qty=parseInt(document.getElementById('mvQty').value)||0;document.getElementById('mvAmount').value=(qty*(item.pricePerUnit||0)).toFixed(2)}

function doInvMove(type,id,dir){var date=document.getElementById('mvDate').value||td();var cfg=INV[type];if(dir>0){var qty=parseFloat(document.getElementById('mvQty').value);var unit=document.getElementById('mvUnit').value;if(isNaN(qty)||qty<=0){toast('填数量');return}var stockQty=qty;if(type==='tea'){var it=DB[cfg.key].find(function(i){return i.id===id});if(it&&it.calcMode==='pack'){stockQty=qty}else{if(unit==='斤')stockQty=qty*500}}else if(type==='cig'){var it=DB[cfg.key].find(function(i){return i.id===id});if(unit==='条')stockQty=qty*(it?it.purchaseConvRatio||10:10)}else{var it=DB[cfg.key].find(function(i){return i.id===id});if(unit==='箱')stockQty=qty*(it?it.purchaseConvRatio||12:12)}stockQty=Math.round(stockQty*100)/100;var entry={date:date,qty:stockQty,source:document.getElementById('mvReason').value||''};var cost=parseFloat(document.getElementById('mvCost').value);if(cost>0)entry.cost=cost;upd(function(db){var it=db[cfg.key].find(function(i){return i.id===id});if(!it)return;it.purchases.push(entry)});closeModal();toast('入库 '+qty+unit)}else{var reason=document.getElementById('mvReason').value||'';if(type==='tea'){var it=DB[cfg.key].find(function(i){return i.id===id});if(!it)return;var cups=parseInt(document.getElementById('mvCups').value)||0;var pots=parseInt(document.getElementById('mvPots').value)||0;var expected=parseFloat(document.getElementById('mvExpected').value)||0;var amount=parseFloat(document.getElementById('mvAmount').value)||expected;var mode=it.calcMode||'gram';var stockUsed=0;if(mode==='pack'){stockUsed=cups*(it.packsPerCup||1)+pots*(it.packsPerPot||2)}else{stockUsed=cups*(it.gramsPerCup||5)+pots*(it.gramsPerPot||15)}stockUsed=Math.round(stockUsed*100)/100;upd(function(db){var it2=db[cfg.key].find(function(i){return i.id===id});if(!it2)return;it2.purchases.push({date:date,qty:-stockUsed,source:reason});it2.sales.push({date:date,cups:cups,pots:pots,expectedAmount:expected,amount:amount})});closeModal();toast('销售 '+cups+'杯'+pots+'壶 应收:'+expected.toFixed(2)+' 实收:'+amount.toFixed(2))}else if(type==='cig'){var qty=parseInt(document.getElementById('mvQty').value)||0;var amount=parseFloat(document.getElementById('mvAmount').value)||0;if(qty<=0){toast('填数量');return}upd(function(db){var it=db[cfg.key].find(function(i){return i.id===id});if(!it)return;it.purchases.push({date:date,qty:-qty,source:reason});it.sales.push({date:date,qty:qty,amount:amount})});closeModal();toast('销售 '+qty+'包 '+amount.toFixed(2)+'元')}else{var qty=parseInt(document.getElementById('mvQty').value)||0;var amount=parseFloat(document.getElementById('mvAmount').value)||0;if(qty<=0){toast('填数量');return}upd(function(db){var it=db[cfg.key].find(function(i){return i.id===id});if(!it)return;it.purchases.push({date:date,qty:-qty,source:reason});it.sales.push({date:date,qty:qty,amount:amount})});closeModal();toast('销售 '+qty+'瓶 '+amount.toFixed(2)+'元')}}rInv(type)}

function doAddInv(type,itemId){var cfg=INV[type];var name=(document.getElementById('ai_name').value||'').trim();if(!name){toast('填名称');return}if(type==='tea'){var mode=document.getElementById('ai_mode').value;if(itemId){upd(function(db){var it=db[cfg.key].find(function(i){return i.id===itemId});if(!it)return;it.name=name;it.calcMode=mode;if(mode==='gram'){it.costPerGram=parseFloat(document.getElementById('ai_costPerGram').value)||0;it.gramsPerCup=parseFloat(document.getElementById('ai_gpc').value)||5;it.gramsPerPot=parseFloat(document.getElementById('ai_gpp').value)||15;it.pricePerCup=parseFloat(document.getElementById('ai_ppc').value)||0;it.pricePerPot=parseFloat(document.getElementById('ai_ppp').value)||0;it.openingStock=parseFloat(document.getElementById('ai_os_g2').value)||0;it.restockAlert=parseInt(document.getElementById('ai_ra_g').value)||0}else{it.gramsPerPack=parseFloat(document.getElementById('ai_gpk').value)||250;it.costPerPack=parseFloat(document.getElementById('ai_cpp').value)||0;it.packsPerCup=parseFloat(document.getElementById('ai_ppcup').value)||1;it.packsPerPot=parseFloat(document.getElementById('ai_pppot').value)||2;it.pricePerCup=parseFloat(document.getElementById('ai_ppc2').value)||0;it.pricePerPot=parseFloat(document.getElementById('ai_ppp2').value)||0;it.openingStock=parseFloat(document.getElementById('ai_os_p2').value)||0;it.restockAlert=parseInt(document.getElementById('ai_ra_p').value)||0}});toast('已更新')}else{var item={id:type+'_'+Date.now(),name:name,calcMode:mode,sales:[],purchases:[]};if(mode==='gram'){item.costPerGram=parseFloat(document.getElementById('ai_costPerGram').value)||0;item.gramsPerCup=parseFloat(document.getElementById('ai_gpc').value)||5;item.gramsPerPot=parseFloat(document.getElementById('ai_gpp').value)||15;item.pricePerCup=parseFloat(document.getElementById('ai_ppc').value)||0;item.pricePerPot=parseFloat(document.getElementById('ai_ppp').value)||0;item.openingStock=parseFloat(document.getElementById('ai_os_g2').value)||0;item.restockAlert=parseInt(document.getElementById('ai_ra_g').value)||0}else{item.gramsPerPack=parseFloat(document.getElementById('ai_gpk').value)||250;item.costPerPack=parseFloat(document.getElementById('ai_cpp').value)||0;item.packsPerCup=parseFloat(document.getElementById('ai_ppcup').value)||1;item.packsPerPot=parseFloat(document.getElementById('ai_pppot').value)||2;item.pricePerCup=parseFloat(document.getElementById('ai_ppc2').value)||0;item.pricePerPot=parseFloat(document.getElementById('ai_ppp2').value)||0;item.openingStock=parseFloat(document.getElementById('ai_os_p2').value)||0;item.restockAlert=parseInt(document.getElementById('ai_ra_p').value)||0}upd(function(db){db[cfg.key].push(item)});toast('已添加')}}else{if(itemId){upd(function(db){var it=db[cfg.key].find(function(i){return i.id===itemId});if(!it)return;it.name=name;it.costPerUnit=parseFloat(document.getElementById('ai_costPerUnit').value)||0;it.pricePerUnit=parseFloat(document.getElementById('ai_pricePerUnit').value)||0;it.openingStock=parseFloat(document.getElementById('ai_os').value)||0;it.restockAlert=parseInt(document.getElementById('ai_ra').value)||0;var pu=document.getElementById('ai_pu');if(pu)it.purchaseUnit=pu.value;var cr=document.getElementById('ai_cr');if(cr)it.purchaseConvRatio=parseInt(cr.value)||10});toast('已更新')}else{var item={id:type+'_'+Date.now(),name:name,costPerUnit:parseFloat(document.getElementById('ai_costPerUnit').value)||0,pricePerUnit:parseFloat(document.getElementById('ai_pricePerUnit').value)||0,openingStock:parseFloat(document.getElementById('ai_os').value)||0,restockAlert:parseInt(document.getElementById('ai_ra').value)||0,sales:[],purchases:[]};var pu=document.getElementById('ai_pu');item.purchaseUnit=pu?pu.value:(type==='cig'?'条':'箱');var cr=document.getElementById('ai_cr');item.purchaseConvRatio=cr?parseInt(cr.value)||10:(type==='cig'?10:12);upd(function(db){db[cfg.key].push(item)});toast('已添加')}}closeModal();rInv(type)}

function saveAiDaily(mode) {
    var date = document.getElementById('aid_date').value || td();

    var report = {
        date: date,
        revenue: {
            grossSales: parseFloat(document.getElementById('aid_gross').value) || 0,
            discount: 0,
            netSales: parseFloat(document.getElementById('aid_net').value) || 0,
            kitchenSales: parseFloat(document.getElementById('aid_kitchen').value) || 0,
            barSales: parseFloat(document.getElementById('aid_bar').value) || 0,
            cigarette: { total: parseFloat(document.getElementById('aid_cig').value) || 0, items: {} },
            other: parseFloat(document.getElementById('aid_other').value) || 0,
            otherItems: {}
        },
        payment: {
            pos: parseFloat(document.getElementById('aid_pos').value) || 0,
            ccbLife: 0, cash: parseFloat(document.getElementById('aid_cash').value) || 0,
            memberCard: parseFloat(document.getElementById('aid_member').value) || 0,
            ar: { total: 0, meituan: 0, douyin: 0 }, treat: 0
        },
        delivery: { total: 0, meituan: 0, taobao: 0, jd: 0 },
        guest: {
            count: parseInt(document.getElementById('aid_count').value) || 0,
            avgSpend: parseFloat(document.getElementById('aid_avg').value) || 0,
            premiumRoomsToday: 0
        },
        rooms: [], premiumRooms: { today: 0 },
        teaSales: {}, cigSales: {}, alcSales: {},
        reporter: document.getElementById('aid_reporter').value.trim()
    };

    upd(function(db) {
        if (mode === 'merge') {
            var existing = db.dailyReports.find(function(d) { return d.date === date; });
            if (existing) {
                // 合并：只更新非零字段
                Object.keys(report.revenue).forEach(function(k) {
                    if (report.revenue[k] && typeof report.revenue[k] === 'number') existing.revenue[k] = report.revenue[k];
                });
                Object.keys(report.payment).forEach(function(k) {
                    if (report.payment[k] && typeof report.payment[k] === 'number') existing.payment[k] = report.payment[k];
                });
                if (report.guest.count) existing.guest.count = report.guest.count;
                if (report.guest.avgSpend) existing.guest.avgSpend = report.guest.avgSpend;
                if (report.reporter) existing.reporter = report.reporter;
                return;
            }
        }
        var idx = db.dailyReports.findIndex(function(d) { return d.date === date; });
        if (idx >= 0) db.dailyReports[idx] = report;
        else db.dailyReports.push(report);
    });

    toast('日报已保存');
    closeModal();
}

function goExpenseWithCategory(cat, amount) {

        if (catSel) {
            // 查找分类选项
            var found = false;

                if (catSel.options[i].value === cat) { catSel.selectedIndex = i; found = true; break; }
            }
            if (!found) {

                var opt = document.createElement('option');

        if (amount > 0) {
            var amtEl = document.getElementById('expAmt');

        }
    }, 100);
}

// 功能3：费用单据识别
// 拍照 → MiMo识别金额日期分类
// ========================================
function aiReceiptOCR() {
    if (!localStorage.getItem('ax_mimo_key')) {
        toast('请先在设置页配置MiMo API');
        return;
    }

    var input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.capture = 'environment';

    input.onchange = function(e) {
        var file = e.target.files[0];
        if (!file) return;

        var reader = new FileReader();
        reader.onload = function(ev) {
            var img = new Image();
            img.onload = function() {
                var canvas = document.createElement('canvas');
                var maxW = 1600;
                var w = img.width, h = img.height;
                if (w > maxW) { h = h * maxW / w; w = maxW; }
                canvas.width = w;
                canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                var base64 = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];

                toast('AI正在识别...');

                mimoOCR(base64, function(reply) {
                    if (!reply) return;
                    var m = reply.match(/\{[\s\S]*\}/);
                    if (!m) { toast('识别失败'); return; }

                    try {
                        var result = JSON.parse(m[0]);
                        var cats = getExpCats();
                        var h = '<h3>识别结果</h3>';
                        h += '<div class="hrow"><label>日期</label><input class="inp" id="ocr_date" type="date" value="' + (result.date || td()) + '"></div>';
                        h += '<div class="hrow"><label>分类</label><select class="inp" id="ocr_cat"><option value="">请选择</option>';
                        cats.forEach(function(c) { h += '<option' + (result.category === c ? ' selected' : '') + '>' + c + '</option>'; });
                        h += '</select></div>';
                        h += '<div class="hrow"><label>金额</label><input class="inp" id="ocr_amount" type="number" value="' + (result.amount || 0) + '"></div>';
                        h += '<div class="hrow"><label>备注</label><input class="inp" id="ocr_note" value="' + (result.description || '') + '"></div>';
                        h += '<div class="brow" style="margin-top:12px"><button class="btn p" onclick="saveOcrExpense()">保存</button><button class="btn" onclick="closeModal()">取消</button></div>';
                        showModal(h, 450);
                    } catch(e) {
                        toast('解析失败');
                    }
                });
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    };
    input.click();
}

function aiBusinessAnalysis(){
    toast('AI正在分析...');
    var ym=curYM();
    var summary=buildMonthSummary(ym);
    var prompt='你是资深餐饮顾问。根据以下经营数据分析并给出建议。\n\n请分析：\n1. 收入结构是否健康\n2. 盈利能力\n3. 运营效率\n4. 至少3条具体可执行的改进措施\n\n数据：\n'+summary;
    mimoChat(prompt,function(reply){
        if(!reply)return;
        saveAIHistory('analysis','经营分析建议',reply);
    });
}



// ========================================
// 功能9：自然语言查询
// 用户随便问，MiMo从数据中找答案
// ========================================
function aiAskQuestion() {
    var q = document.getElementById('aiQuestion').value.trim();
    if (!q) { toast('请输入问题'); return; }

    var el = document.getElementById('aiAnswer');
    el.innerHTML = '<div style="padding:10px;color:var(--tx-m)">AI正在思考...</div>';

    var ym = curYM();
    var summary = buildMonthSummary(ym);

    var prompt = '你是一个餐厅数据分析助手。请根据以下经营数据回答用户的问题。\n'
        + '回答要简洁准确，有数据支撑。如果数据中没有相关信息，就说"数据中没有找到相关信息"。\n\n'
        + '当前经营数据：\n' + summary + '\n\n'
        + '用户问题：' + q;

    mimoChat(prompt, function(reply) {
        if (!reply) {
            el.innerHTML = '<div style="padding:10px;color:var(--rd)">回答失败</div>';
            return;
        }
        saveAIHistory('ask','AI问答',reply);
        el.innerHTML = '<div style="margin-top:10px;padding:12px;background:var(--card-h);border:1px solid var(--bd);border-radius:var(--r);font-size:.82rem;line-height:1.8;">' + md2html(reply) + '</div>';
    });
}
