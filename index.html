// ==================== 17. GitHub 同步 ====================

// 存储键名
var GH_KEY = 'ax_gh_cfg';

// 全局同步状态
// token: GitHub Token
// gistId: 数据 Gist 的 ID
// mediaGistId: 媒体文件 Gist 的 ID（预留）
// ready: 是否已连接
// saving: 是否正在保存（防止重复请求）
var _gh = { token: '', gistId: '', mediaGistId: '', ready: false, saving: false };

// ---------- 读取本地配置 ----------
function ghGetCfg() {
    try { return JSON.parse(localStorage.getItem(GH_KEY)) || {}; }
    catch (e) { return {}; }
}

// ---------- 保存本地配置 ----------
function ghSaveCfg(c) {
    localStorage.setItem(GH_KEY, JSON.stringify(c));
}

// ---------- 初始化同步 ----------
// 从 localStorage 读取 Token，如果存在则标记为已连接
function ghInit() {
    var c = ghGetCfg();
    if (!c.token) return false;
    _gh.token = c.token;
    _gh.gistId = c.gistId || '';
    _gh.mediaGistId = c.mediaGistId || '';
    _gh.ready = true;
    return true;
}

// ---------- 搜索已有 Gist ----------
// 遍历用户的 Gist 列表（最多5页），找到描述为 'ax_cafe_data' 的
async function ghFindGist() {
    if (!_gh.ready) return null;
    try {
        var pg = 1;
        while (pg <= 5) {
            var r = await fetch('https://api.github.com/gists?per_page=100&page=' + pg, {
                headers: { 'Authorization': 'token ' + _gh.token }
            });
            if (!r.ok) return null;
            var gs = await r.json();
            if (!gs.length) break;
            for (var i = 0; i < gs.length; i++) {
                if (gs[i].description === 'ax_cafe_data') return gs[i];
            }
            pg++;
        }
        return null;
    } catch (e) { return null; }
}

// ---------- 从 GitHub 下载数据 ----------
// 只有远程数据更新时间（_ts）比本地新时才返回数据
async function ghLoad() {
    if (!_gh.ready || !_gh.gistId) return null;
    try {
        var r = await fetch('https://api.github.com/gists/' + _gh.gistId, {
            headers: { 'Authorization': 'token ' + _gh.token }
        });
        if (!r.ok) return null;
        var g = await r.json();
        var f = g.files && g.files['ax_cafe_data.json'];
        if (f && f.content) {
            var d = JSON.parse(f.content);
            if (d._ts && d._ts > (DB._ts || 0)) return d;
        }
    } catch (e) {}
    return null;
}

// ---------- 上传数据到 GitHub ----------
// 有 gistId 就更新，没有就新建
// saving 锁防止重复提交
async function ghSave() {
    if (!_gh.ready || !_gh.token || _gh.saving) return;
    _gh.saving = true;
    updSyncInd();
    DB._ts = Date.now();

    try {
        var url = _gh.gistId
            ? 'https://api.github.com/gists/' + _gh.gistId
            : 'https://api.github.com/gists';
        var r = await fetch(url, {
            method: _gh.gistId ? 'PATCH' : 'POST',
            headers: {
                'Authorization': 'token ' + _gh.token,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                description: 'ax_cafe_data',
                files: { 'ax_cafe_data.json': { content: JSON.stringify(DB) } }
            })
        });
        if (r.ok) {
            var g = await r.json();
            // 新建的 Gist，保存 gistId
            if (!_gh.gistId) {
                _gh.gistId = g.id;
                var c = ghGetCfg();
                c.gistId = g.id;
                ghSaveCfg(c);
            }
        }
    } catch (e) {}

    _gh.saving = false;
    updSyncInd();
}

// ---------- 启动时同步 ----------
// 优先下载远程数据（如果远程更新的话），否则上传本地数据
async function ghSyncOnStart() {
    if (!_gh.ready) return;
    var cur = curPage;
    var remote = await ghLoad();
    if (remote) {
        DB = remote;
        saveDB(DB);
        toast('云端已加载');
    } else if (DB.dailyReports.length) {
        await ghSave();
        toast('已上传');
    }
    // 同步完成后恢复当前页面
    if (cur) {
        curPage = cur;
        _curPage = cur;
        renderNav();
    }
}

// ---------- 设置 Token 并连接 ----------
// 流程：保存Token → 尝试已存gistId → 搜索已有Gist → 新建Gist
async function ghSetToken(t) {
    t = t.trim();
    if (!t) return;

    _gh.token = t;
    _gh.ready = true;
    var c = ghGetCfg();
    c.token = t;
    ghSaveCfg(c);
    _gh.gistId = c.gistId || '';
    _gh.mediaGistId = c.mediaGistId || '';

    toast('连接中...');

    // 第一步：尝试已保存的 gistId
    if (_gh.gistId) {
        try {
            var r = await fetch('https://api.github.com/gists/' + _gh.gistId, {
                headers: { 'Authorization': 'token ' + _gh.token }
            });
            if (r.ok) {
                toast('已找到数据');
                await ghSyncOnStart();
                updSyncInd();
                rData();
                return;
            }
        } catch (e) {}
    }

    // 第二步：搜索用户所有 Gist 找已有的
    var ex = await ghFindGist();
    if (ex) {
        _gh.gistId = ex.id;
        c = ghGetCfg();
        c.gistId = ex.id;
        ghSaveCfg(c);
        toast('找到已有数据');
        await ghSyncOnStart();
    } else {
        // 第三步：都没找到，新建一个
        await ghSave();
        c = ghGetCfg();
        c.gistId = _gh.gistId;
        ghSaveCfg(c);
        toast('已连接');
    }

    updSyncInd();
    rData();
}

// ---------- 断开连接 ----------
function ghDisconnect() {
    if (!confirm('断开？')) return;
    localStorage.removeItem(GH_KEY);
    _gh = { token: '', gistId: '', mediaGistId: '', ready: false, saving: false };
    updSyncInd();
    rData();
    toast('已断开');
}

// ---------- 更新顶部同步状态指示灯 ----------
// 绿色圆点 = 已同步，灰色圆点 = 仅本地
function updSyncInd() {
    var el = $id('syncInd');
    if (!el) return;
    el.innerHTML = _gh.ready
        ? '<span class="sync-dot" style="background:var(--gn)"></span>已同步'
        : '<span class="sync-dot" style="background:var(--tx-m)"></span>本地';
}

// ---------- 延迟保存（防抖）----------
// 数据变化后等 1.5 秒再上传，避免频繁请求
var _ghTimer = null;
function ghScheduleSave() {
    if (!_gh.ready) return;
    if (_ghTimer) clearTimeout(_ghTimer);
    _ghTimer = setTimeout(ghSave, 1500);
}

// ==================== 18. 同步码 ====================
// ---------- 生成同步码 ----------
function genSyncCode() {
    try {
        var data = JSON.stringify(DB);
        var encoded = btoa(unescape(encodeURIComponent(data)));

        // 分块显示（避免单行过长）
        var chunkSize = 1000;
        var chunks = [];
        for (var i = 0; i < encoded.length; i += chunkSize) {
            chunks.push(encoded.substring(i, i + chunkSize));
        }

        var h = '<h3>数据同步码</h3>';
        h += '<div style="font-size:.72rem;color:var(--tx-m);margin-bottom:10px">数据大小：' + (encoded.length / 1024).toFixed(1) + 'KB</div>';
        h += '<textarea id="syncCodeOutput" style="width:100%;height:300px;font-family:monospace;font-size:.7rem;resize:vertical" readonly>' + chunks.join('\n') + '</textarea>';
        h += '<div class="brow" style="margin-top:10px">';
        h += '<button class="btn p" onclick="copySyncCode()">复制全部</button>';
        h += '<button class="btn" onclick="closeModal()">关闭</button></div>';
        showModal(h, 600);
    } catch (e) {
        toast('生成同步码失败：' + e.message);
    }
}

// ---------- 复制同步码 ----------
function copySyncCode() {
    var textarea = $id('syncCodeOutput');
    if (!textarea) return;

    textarea.select();
    textarea.setSelectionRange(0, 99999); // 兼容移动端

    try {
        document.execCommand('copy');
        toast('已复制到剪贴板');
    } catch (e) {
        // 尝试使用现代API
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(textarea.value)
                .then(function() { toast('已复制到剪贴板'); })
                .catch(function() { toast('复制失败，请手动选择复制'); });
        } else {
            toast('复制失败，请手动选择复制');
        }
    }
}

// ---------- 导入同步码 ----------
function importSyncCode() {
    var h = '<h3>导入同步码</h3>';
    h += '<div style="font-size:.74rem;color:var(--tx-m);margin-bottom:10px">粘贴之前生成的同步码，将覆盖当前所有数据</div>';
    h += '<textarea id="syncCodeInput" style="width:100%;height:300px;font-family:monospace;font-size:.7rem;resize:vertical" placeholder="粘贴同步码..."></textarea>';
    h += '<div class="brow" style="margin-top:10px">';
    h += '<button class="btn p" onclick="doImportSyncCode()">导入</button>';
    h += '<button class="btn" onclick="closeModal()">取消</button></div>';
    showModal(h, 600);
}

// ---------- 执行导入 ----------
function doImportSyncCode() {
    var input = $id('syncCodeInput');
    if (!input) return;

    var code = (input.value || '').trim();
    if (!code) { toast('请粘贴同步码'); return; }

    // 去掉可能的换行符
    code = code.replace(/\n/g, '').replace(/\r/g, '');

    try {
        var decoded = decodeURIComponent(escape(atob(code)));
        var data = JSON.parse(decoded);

        // 简单验证数据结构
        if (!data.dailyReports && !data.purchases && !data.expenses) {
            toast('同步码格式错误：缺少必要数据');
            return;
        }

        if (!confirm('确认导入？这将覆盖当前所有数据！')) return;

        DB = data;
        saveDB(DB);
        ghScheduleSave();
        toast('导入成功');
        closeModal();
        goPage(_curPage || 'dash'); // 刷新当前页面
    } catch (e) {
        toast('导入失败：同步码格式错误或已损坏');
        console.error('导入同步码失败:', e);
    }
}

// Chart.js 多源加载（防止单一CDN失效）
var _chartSrcs = [
    'https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.0/chart.umd.min.js',
    'https://unpkg.com/chart.js@4.4.0/dist/chart.umd.min.js',
    'https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js'
];

function _loadChart(i) {
    if (i >= _chartSrcs.length) {
        console.warn('Chart.js 加载失败，图表功能不可用');
        return;
    }
    var s = document.createElement('script');
    s.src = _chartSrcs[i];
    s.onload = function() {
        window._chartLoaded = true;
        console.log('Chart.js 加载成功');
    };
    s.onerror = function() {
        console.warn('Chart.js CDN ' + (i + 1) + ' 失败，尝试下一个...');
        _loadChart(i + 1);
    };
    document.head.appendChild(s);
}

// 开始加载Chart.js
_loadChart(0);
